"], "ans": 0, "exp": "Fever results from a temporary resetting of the hypothalamic thermostat to a higher level, triggered by pyrogens, leading to increased heat production and conservation (such as vasoconstriction and shivering) until the new, higher set point is reached."}, {"q": "Which statement accurately describes exogenous pyrogens?", "opts": ["They are produced internally by lymphocytes", "They are endotoxins, such as those from bacteria", "They only originate from the hypothalamus", "They directly cause hypothermia"], "ans": 1, "exp": "Exogenous pyrogens originate from outside the body and are commonly endotoxins released by bacteria, which trigger the release of endogenous pyrogens (such as cytokines) that act on the hypothalamus to raise the body's temperature set point."}, {"q": "Most vivid, memorable dreams occur during which phase of sleep?", "opts": ["NREM stage 1", "NREM stage 3 (deep sleep)", "REM sleep", "The transition period just before falling asleep"], "ans": 2, "exp": "REM (rapid eye movement) sleep is associated with the most vivid and memorable dreaming. It is sometimes called 'paradoxical sleep' because the EEG pattern during REM resembles that of normal wakefulness, despite the body being in a state of muscle relaxation."}, {"q": "About how often does REM sleep recur during a normal night's sleep cycle?", "opts": ["Every 30 minutes", "Every 90 minutes", "Every 4 hours", "Only once per night"], "ans": 1, "exp": "REM sleep occurs approximately every 90 minutes, following one to two cycles of NREM sleep, and recurs multiple times throughout a typical night, with REM periods generally lengthening as the night progresses."}, {"q": "During the sleep cycle, loss of normal thermoregulatory control characteristically occurs during which phase?", "opts": ["NREM stage 1", "NREM stage 2", "REM sleep", "The moment of sleep onset only"], "ans": 2, "exp": "REM sleep is associated with loss of normal thermoregulatory control, along with variable autonomic activity (heart rate, blood pressure, respiration), muscle relaxation/atonia, and the most vivid dreaming."}, {"q": "Which structure in the eye absorbs light and prevents it from scattering within the eye?", "opts": ["Cornea", "Choroid", "Lens", "Sclera"], "ans": 1, "exp": "The choroid, the pigmented middle layer of the eye, absorbs light and prevents it from scattering internally, which would otherwise blur visual images. The sclera forms the tough outer layer, the cornea is its transparent anterior portion, and the lens focuses light onto the retina."}, {"q": "Which structure connects the middle ear to the pharynx, allowing for pressure equalization?", "opts": ["Cochlea", "Eustachian tube", "Semicircular canals", "Organ of Corti"], "ans": 1, "exp": "The eustachian tube connects the middle ear (tympanic cavity) to the pharynx (throat), allowing for equalization of air pressure between the middle ear and the outside atmosphere."}, {"q": "Which system modulates a patient's perception of pain, including pain threshold, tolerance, and perceptual dominance?", "opts": ["Sensory-discriminative system", "Affective-motivational system", "Cognitive-evaluative system", "Reticular activating system"], "ans": 2, "exp": "The cognitive-evaluative system is involved in pain perception and modulates factors such as pain threshold, perceptual dominance, and pain tolerance, reflecting the conscious, cognitive processing of the pain experience."}, {"q": "Infants have particular difficulty with thermoregulation for which combination of reasons?", "opts": ["They sweat excessively and have thick subcutaneous fat", "They cannot conserve heat well and are unable to shiver", "They have a low surface-to-weight ratio and excess body fat", "They have an overactive shivering response"], "ans": 1, "exp": "Infants have particular difficulty with thermoregulation because they cannot conserve heat well (due to a high surface-to-weight ratio and thin subcutaneous fat) and are unable to shiver, limiting their ability to generate additional heat through this mechanism."}, {"q": "Fever of unknown origin (FUO) is generally characterized by a temperature of what value or greater, persisting without a clear diagnosis?", "opts": ["99°F", "101°F", "106°F", "94°F"], "ans": 1, "exp": "Fever of unknown origin (FUO) is characterized by a persistent fever of 101°F or greater (lasting more than three weeks in the classic definition) without an identified underlying cause despite evaluation."}], "clinical": [{"q": "For which patient would the primary care provider most likely order therapeutic hypothermia?", "opts": ["A patient with ischemic tissue damage", "A patient with macular degeneration", "A patient with increased heat production", "A patient undergoing reimplantation surgery"], "ans": 3, "exp": "Therapeutic hypothermia is used to slow cellular metabolism and preserve ischemic tissue, making it valuable during reimplantation surgery (and other situations such as cardiac arrest or certain neurosurgical procedures) to protect tissue from injury during reduced blood flow."}, {"q": "A 5-year-old breaks her leg falling from a merry-go-round. Which substance would be released from the midbrain to help modulate her pain?", "opts": ["Substance P", "Dynorphin", "Histamine", "Cortisol"], "ans": 1, "exp": "Dynorphin is an endogenous opioid neuropeptide released from midbrain structures as part of the descending inhibitory pain pathways, acting on opioid receptors to help modulate and reduce the perception of pain after an acute injury."}, {"q": "A 50-year-old male who lost his hand in a sawmill accident years ago still sporadically feels pain in the absent hand. What should the nurse document?", "opts": ["Somatic pain", "Visceral pain", "Phantom limb pain", "Acute pain"], "ans": 2, "exp": "This presentation is classic for phantom limb pain—pain perceived as originating from an amputated body part, which can persist for years after the amputation due to changes in peripheral and central nervous system processing."}, {"q": "A nurse is teaching a patient about heat loss mechanisms. Which patient statement indicates successful teaching about convection?", "opts": ["'Heat leaves my body when I touch something cold.'", "'Heat leaves my body through currents of air or liquid moving across my skin.'", "'Heat leaves my body as sweat evaporates.'", "'Heat leaves my body as infrared energy radiates outward.'"], "ans": 1, "exp": "This statement correctly describes convection: the transfer of heat through currents of liquid or gas (such as air or water moving across the skin). Touching a cold object describes conduction, sweat evaporation describes evaporative heat loss, and infrared transfer describes radiation."}, {"q": "A 25-year-old female takes a weight-loss medication that increases epinephrine release. Which additional effect should the nurse anticipate?", "opts": ["Decreased heat production", "Increased heat production", "Hypothermia", "Loss of thermoregulatory control"], "ans": 1, "exp": "Epinephrine increases metabolic rate and stimulates thermogenesis, so increased epinephrine release from a weight-loss medication would be expected to also increase heat production as a side effect."}, {"q": "A patient researches exogenous pyrogens online. Which statement indicates a correct understanding?", "opts": ["'Exogenous pyrogens are produced by my own white blood cells.'", "'Exogenous pyrogens are endotoxins, like those from bacteria.'", "'Exogenous pyrogens only come from the hypothalamus.'", "'Exogenous pyrogens directly cause hypothermia.'"], "ans": 1, "exp": "Exogenous pyrogens originate outside the body and are commonly endotoxins (such as those released by gram-negative bacteria), which trigger the release of endogenous pyrogens (cytokines produced by the patient's own immune cells) that act on the hypothalamus to raise body temperature."}, {"q": "Hikers crossing the Arizona desert with limited water sweat profusely and become dehydrated. What condition does this describe?", "opts": ["Heat stroke", "Heat exhaustion", "Malignant hyperthermia", "Heat cramps"], "ans": 1, "exp": "Heat exhaustion results from vasodilation combined with profuse sweating during prolonged exposure to high temperatures, leading to significant fluid loss and dehydration, as described in this scenario. Heat stroke is more severe, involving failure of heat-loss mechanisms and dangerously high core temperature."}, {"q": "A 10-year-old hides in a meat freezer for several hours to avoid being caught. What is his body most likely experiencing while in the cooler?", "opts": ["Increased heat production with sweating", "Ischemic tissue damage from prolonged cold exposure", "Heat exhaustion", "Malignant hyperthermia"], "ans": 1, "exp": "Prolonged exposure to severe cold causes vasoconstriction, increased blood viscosity, and increased coagulation, which together can lead to ischemic tissue damage as blood flow to peripheral tissues becomes compromised."}, {"q": "A patient is showing complications from heat stroke. Which finding indicates this serious complication?", "opts": ["Mild dehydration with thirst", "Cerebral edema and degeneration of the CNS", "Slightly elevated heart rate only", "Localized muscle cramping only"], "ans": 1, "exp": "Heat stroke is the most severe form of hyperthermia, resulting from failure of heat-loss mechanisms and a core temperature exceeding 40°C (104°F); serious complications include cerebral edema and degeneration of CNS tissue, which can be fatal if not promptly treated."}, {"q": "A patient undergoes a sleep study, and the technician notes EEG patterns with brain activity resembling the normal awake pattern. Which phase of sleep is occurring?", "opts": ["NREM stage 1", "NREM stage 3", "REM sleep", "Sleep onset"], "ans": 2, "exp": "REM sleep is sometimes called 'paradoxical sleep' because the EEG pattern closely resembles that of a normal awake state, even though the person remains asleep with significant muscle relaxation/atonia and is experiencing the most vivid dreams of the sleep cycle."}, {"q": "A 52-year-old male undergoes a sleep study for loud snoring and daytime fatigue, with his wife reporting she can no longer sleep in the same bed due to the noise. What is the most likely diagnosis?", "opts": ["Narcolepsy", "Obstructive sleep apnea syndrome (OSAS)", "Restless leg syndrome", "Night terrors"], "ans": 1, "exp": "Obstructive sleep apnea syndrome (OSAS) is the most commonly diagnosed sleep disorder, characterized by loud snoring, witnessed apneic episodes, and significant daytime fatigue due to disrupted, fragmented sleep from repeated partial or total airway obstruction."}, {"q": "A 14-year-old has sudden apparent arousals with intense fear, waking and screaming but difficult to fully awaken. What does she most likely suffer from?", "opts": ["Nightmares during REM sleep", "Night terrors", "Narcolepsy with cataplexy", "Obstructive sleep apnea"], "ans": 1, "exp": "Night terrors are a parasomnia occurring during NREM sleep (specifically stage 3), characterized by sudden arousal with intense fear or other strong emotion, often with screaming, while the person remains difficult to fully awaken and typically has no memory of the event afterward."}, {"q": "A 50-year-old diabetic patient is told that the cells allowing him to see have degenerated. Which structure is most likely damaged?", "opts": ["Cornea", "Choroid", "Retina", "Sclera"], "ans": 2, "exp": "The retina contains the photoreceptor cells (rods and cones) responsible for vision; in diabetic patients, diabetic retinopathy involves damage to the retinal blood vessels and tissue, leading to progressive visual disturbance and potential blindness if untreated."}, {"q": "A young child has one eye that deviates outward, decreasing the visual field. Which diagnosis is most likely?", "opts": ["Esotropia", "Exotropia", "Nystagmus", "Amblyopia"], "ans": 1, "exp": "Exotropia is a form of strabismus in which one eye deviates outward, which can decrease the visual field and, if uncorrected, lead to amblyopia (reduced vision in the deviating eye) as the brain begins to suppress input from that eye."}, {"q": "A patient has increased intraocular pressure. Which diagnosis will the nurse expect to see documented?", "opts": ["Cataracts", "Glaucoma", "Macular degeneration", "Retinal detachment"], "ans": 1, "exp": "Glaucoma is defined by increased intraocular pressure, which can damage the optic nerve over time and is considered an ophthalmic emergency in acute presentations due to the risk of permanent vision loss."}, {"q": "A 70-year-old male with hypertension and a smoking history reports progressive vision loss. Which disorder is most likely responsible?", "opts": ["Glaucoma", "Cataracts", "Macular degeneration", "Retinal detachment"], "ans": 2, "exp": "Age-related macular degeneration is strongly associated with risk factors including advanced age, hypertension, and smoking, and is a leading cause of progressive central vision loss in older adults."}, {"q": "Which group of individuals is most prone to red-green color blindness?", "opts": ["Females", "Males", "Children under age 5", "Adults over age 65"], "ans": 1, "exp": "Red-green color blindness is an X-linked recessive trait, making males (who have only one X chromosome) far more likely to be affected than females, who would need the trait on both X chromosomes to be affected."}, {"q": "A 35-year-old female presents with watery, severely reddened, light-sensitive eyes, diagnosed as viral conjunctivitis. Which pathogen most commonly causes this?", "opts": ["Staphylococcus aureus", "Adenovirus", "Chlamydia trachomatis", "Herpes simplex virus exclusively"], "ans": 1, "exp": "Adenovirus is the most common cause of viral conjunctivitis, producing the classic presentation of watery discharge, redness, and photophobia, and is highly contagious."}, {"q": "Which condition is the most common form of sensorineural hearing loss in elderly patients?", "opts": ["Otitis media", "Presbycusis", "Ménière disease", "Conductive hearing loss"], "ans": 1, "exp": "Presbycusis, age-related sensorineural hearing loss, is the most common cause of hearing impairment in the elderly, resulting from progressive degeneration of the Organ of Corti and associated auditory structures."}, {"q": "A 15-year-old female is diagnosed with an outer ear infection (otitis externa). Which organism most likely caused this?", "opts": ["Streptococcus pneumoniae", "Escherichia coli", "Haemophilus influenzae", "Neisseria meningitidis"], "ans": 1, "exp": "Otitis externa (\"swimmer's ear\") is commonly caused by bacteria such as Escherichia coli and Pseudomonas, often following prolonged moisture exposure in the ear canal that disrupts the normal protective skin barrier."}, {"q": "A patient with an alteration in proprioception reports vertigo. How is this typically manifested?", "opts": ["A sensation that the room is spinning", "Complete loss of balance with no other symptoms", "Sharp, localized ear pain", "Gradual, painless hearing loss"], "ans": 0, "exp": "Vertigo is manifested as a sensation that the room (or the patient) is spinning, reflecting a mismatch or disturbance in the vestibular system and proprioceptive input that the brain uses to maintain spatial orientation and balance."}], "color": "c15"}, {"title": "Alterations in Cognitive Systems, Cerebral Hemodynamics, and Motor Function", "code": "Chapter 16", "subtitle": "Consciousness, ICP, Herniation, Hydrocephalus & Motor Syndromes", "general": [{"q": "Which structure mediates arousal, regulating attention and information processing to maintain consciousness?", "opts": ["Cerebral cortex", "Medulla oblongata", "Reticular activating system", "Cingulate gyrus"], "ans": 2, "exp": "Arousal is mediated by the reticular activating system, which regulates aspects of attention and information processing and maintains consciousness. The cerebral cortex affects movement and cognition rather than arousal itself; the medulla oblongata controls functions such as hiccups and vomiting; the cingulate gyrus plays other roles."}, {"q": "Which two components together make up the neurologic functions essential for maintaining consciousness?", "opts": ["Arousal and awareness", "Memory and language", "Reflexes and posture", "Vision and hearing"], "ans": 0, "exp": "Consciousness depends on both arousal (a state of awakeness, mediated by the reticular activating system) and awareness (encompassing cognitive function, mediated by the cerebral cortex). Loss of either component can alter the level of consciousness."}, {"q": "Which term describes an explosive, disorderly discharge of cortical neurons?", "opts": ["Reflex", "Seizure", "Inattentiveness", "Brain death"], "ans": 1, "exp": "A seizure is an explosive, disorderly discharge of cortical neurons—a manifestation of abnormal electrical activity rather than a disease itself. A reflex is an expected, predictable response; inattentiveness is a form of neglect; brain death is complete cessation of brain function."}, {"q": "Which statement correctly defines brain death for legal purposes?", "opts": ["Cessation of entire brain function, including brainstem and cerebellum", "Lack of cortical function alone", "A consistent vegetative state", "Death of the brainstem alone"], "ans": 0, "exp": "Brain death occurs when there is cessation of function of the entire brain, including the brainstem and cerebellum. Lack of cortical function alone or brainstem death alone is not sufficient to define brain death; a vegetative state is a distinct condition involving complete unawareness but preserved brainstem function."}, {"q": "A compensatory alteration in the diameter of cerebral blood vessels that maintains constant blood flow despite changes in cerebral perfusion pressure is called:", "opts": ["Herniation", "Vasodilation", "Autoregulation", "Amyotrophy"], "ans": 2, "exp": "Autoregulation is the compensatory alteration in the diameter of intracranial blood vessels designed to maintain constant blood flow during changes in cerebral perfusion pressure. Herniation is the downward protrusion of brain tissue; vasodilation is just one component of autoregulation, not the whole process; amyotrophy relates to spinal anterior horn cells and is unrelated."}, {"q": "What is the normal range for intracranial pressure (ICP)?", "opts": ["1-15 mm Hg", "20-30 mm Hg", "40-60 mm Hg", "Less than 1 mm Hg"], "ans": 0, "exp": "Normal ICP is 1-15 mm Hg. Readings above this range (such as 24 mm Hg) indicate increased intracranial pressure and warrant prompt clinical attention."}, {"q": "Which type of cerebral edema is clinically significant because the blood-brain barrier is disrupted, allowing plasma proteins to leak into extracellular spaces?", "opts": ["Cytotoxic edema", "Vasogenic edema", "Interstitial edema", "Ischemic edema"], "ans": 1, "exp": "Vasogenic edema is clinically important because the blood-brain barrier (the selective permeability of brain capillaries) is disrupted, allowing plasma proteins to leak into the extracellular spaces and draw fluid with them. It does not have an infectious cause and does not always cause herniation."}, {"q": "Which type of herniation occurs when the cerebellar tonsil shifts through the foramen magnum due to increased pressure within the posterior fossa?", "opts": ["Supratentorial herniation", "Central herniation", "Cingulate gyrus herniation", "Infratentorial herniation"], "ans": 3, "exp": "In infratentorial herniation, the cerebellar tonsil shifts through the foramen magnum because of increased pressure within the posterior fossa. Supratentorial herniation involves shifting of the temporal lobe and hippocampal gyrus from the middle to posterior fossa; central herniation is a type of supratentorial herniation involving downward shift of the diencephalon; cingulate gyrus herniation occurs when that structure shifts under the falx cerebri."}, {"q": "Communicating hydrocephalus in adults is most often caused by:", "opts": ["Overproduction of CSF", "Intercellular edema", "Elevated arterial blood pressure", "Defective CSF reabsorption"], "ans": 3, "exp": "Communicating hydrocephalus occurs because of defective reabsorption of cerebrospinal fluid. While hydrocephalus can also occur from CSF overproduction, in adults it most often results from impaired reabsorption (typically at the arachnoid villi)."}, {"q": "A patient demonstrates resistance to passive movement that varies in direct proportion to the force applied. What is this finding called?", "opts": ["Spasticity", "Paratonia", "Rigidity", "Dystonia"], "ans": 1, "exp": "Paratonia is manifested by resistance to passive movement that varies in direct proportion to the force applied. Spasticity involves a gradual increase in tone with sudden release; rigidity is uniform resistance throughout flexion and extension; dystonia involves sustained, involuntary twisting movements."}, {"q": "Which term describes decreased muscle tone, often causing tiring easily, difficulty rising from a sitting position, and inability to stand on toes?", "opts": ["Parkinson disease", "Hypotonia", "Huntington disease", "Paresis"], "ans": 1, "exp": "Hypotonia is decreased muscle tone, causing individuals to tire easily (asthenia), have difficulty rising from sitting, and struggle to stand on their toes. Parkinson disease instead causes rigidity and stiffness; Huntington disease causes excessive, uncontrolled movement; paresis refers to partial weakness rather than tone abnormality."}, {"q": "Which term describes excessive, purposeless movement?", "opts": ["Hypokinesia", "Akinesia", "Hyperkinesia", "Bradykinesia"], "ans": 2, "exp": "Hyperkinesia refers to excessive movement. Hypokinesia is decreased movement, akinesia is a loss of movement altogether, and bradykinesia is abnormally slow movement—all distinct from the excessive movement of hyperkinesia."}, {"q": "Which gait pattern is characterized by walking with the leg extended and held stiff, scraping over the floor surface?", "opts": ["Spastic gait", "Cerebellar gait", "Basal ganglion gait", "Scissors gait"], "ans": 0, "exp": "A spastic gait involves walking with the leg extended and held stiff, causing the foot to scrape the floor. A cerebellar gait is wide-based and unsteady; a basal ganglion gait involves small steps with decreased arm swing; a scissors gait involves the legs crossing/touching from bilateral spasticity."}, {"q": "Paralysis of both legs is best described by which term?", "opts": ["Paraplegia", "Quadriplegia", "Hemiplegia", "Diplegia"], "ans": 0, "exp": "Paraplegia is paralysis of both legs. Quadriplegia involves all four extremities, hemiplegia involves one side of the body, and diplegia generally refers to paralysis affecting corresponding body parts on both sides (such as both arms or both legs, depending on context)."}, {"q": "Spinal shock is best characterized by:", "opts": ["Loss of voluntary motor function with preservation of reflexes", "Cessation of spinal cord function below the level of the lesion", "Loss of spinal cord function only at the level of the lesion", "Temporary loss of spinal cord function above the lesion"], "ans": 1, "exp": "Spinal shock is the complete cessation of spinal cord function below the level of the lesion, including loss of reflexes (not preservation of them). It affects function below the injury, not only at the level of the lesion itself."}, {"q": "Which of the following structural causes of altered arousal involves destruction of the reticular activating system or brainstem itself?", "opts": ["Supratentorial structural cause", "Infratentorial structural cause", "Metabolic cause", "Psychogenic cause"], "ans": 1, "exp": "Infratentorial structural causes of altered arousal involve direct destruction of the reticular activating system or brainstem. Supratentorial causes involve diffuse or localized dysfunction above the tentorium; metabolic causes involve altered energy delivery (such as hypoxia or hypoglycemia); psychogenic causes are uncommon and reflect a psychiatric process rather than structural damage."}, {"q": "Which neurologic function is considered the single most critical indicator when evaluating a patient's level of consciousness?", "opts": ["Pupillary reaction", "Pattern of breathing", "Level of consciousness itself, assessed via responsiveness", "Oculomotor response"], "ans": 2, "exp": "Level of consciousness is considered the most critical of the neurologic functions evaluated (along with breathing pattern, pupillary reaction, oculomotor responses, and motor responses), since a decline in LOC is often the earliest and most sensitive sign of neurologic deterioration."}, {"q": "Which upper motor neuron syndrome term describes weakness or paralysis affecting all four extremities?", "opts": ["Hemiparesis or hemiplegia", "Diplegia", "Paraparesis or paraplegia", "Quadriparesis or quadriplegia"], "ans": 3, "exp": "Quadriparesis (weakness) or quadriplegia (paralysis) refers to involvement of all four extremities, typically resulting from a high cervical spinal cord lesion or bilateral cerebral injury affecting the corticospinal tracts."}, {"q": "Which posture is associated with a lesion above the midbrain, involving the cerebral hemispheres or diencephalon?", "opts": ["Decorticate posturing", "Decerebrate posturing", "Basal ganglion posturing", "Dystonic posturing"], "ans": 0, "exp": "Decorticate posturing (arms flexed, legs extended) results from lesions above the midbrain, in the cerebral hemispheres or diencephalon. Decerebrate posturing, by contrast, indicates a lower, more ominous brainstem-level lesion, with all four extremities in rigid extension."}, {"q": "Which condition results from progressive degeneration of upper and/or lower motor neurons and can present with muscle weakness, atrophy, spasticity, and eventual respiratory failure?", "opts": ["Myasthenia gravis", "Amyotrophic lateral sclerosis (ALS)", "Multiple sclerosis", "Huntington disease"], "ans": 1, "exp": "Amyotrophic lateral sclerosis (ALS) is a motor neuron disease resulting from progressive degeneration of upper and lower motor neurons, causing progressive muscle weakness, atrophy, spasticity, loss of dexterity and gait, and is usually fatal from respiratory failure within a few years of diagnosis."}], "clinical": [{"q": "A 20-year-old experiences a severe closed head injury in a motor vehicle accident. One month later, he remains in a vegetative state. Which structure is most likely keeping him in this state?", "opts": ["Cerebral cortex", "Brainstem", "Spinal cord", "Cerebellum"], "ans": 1, "exp": "When a person loses cerebral (cortical) function, the reticular activating system and brainstem can maintain a crude waking state known as a vegetative state. True cognitive function, however, cannot occur without an intact, functioning cerebral cortex. A vegetative state is not associated with the spinal cord or cerebellum."}, {"q": "A 16-year-old's level of arousal is altered after recreational drug use. Exam reveals a negative Babinski sign, equal and reactive pupils, and roving eye movements. Which diagnosis fits these findings?", "opts": ["Psychogenic arousal alteration", "Metabolically induced coma", "Structurally induced coma", "Structural arousal alteration"], "ans": 1, "exp": "Persons with metabolically induced coma generally retain ocular reflexes (such as roving eye movements and reactive pupils) even when other signs of altered consciousness are present, distinguishing it from structurally induced coma, which typically presents with asymmetric findings. Psychogenic arousal alteration reflects a psychiatric disorder, not drug toxicity."}, {"q": "A patient's breathing pattern is being assessed and reflects respirations driven primarily by carbon dioxide levels in the blood. Which pattern is this?", "opts": ["Cheyne-Stokes respirations", "Ataxic breathing", "Central neurogenic hyperventilation", "Normal respirations"], "ans": 0, "exp": "Cheyne-Stokes respirations (a crescendo-decrescendo pattern with periods of apnea) occur as a result of CO2 levels in the blood. Ataxic breathing results from dysfunction of medullary neurons; central neurogenic hyperventilation results from uncal herniation; normal respirations are driven primarily by oxygen levels."}, {"q": "A teenager sustains a severe closed head injury and is in a state of deep sleep requiring vigorous, repeated stimulation to elicit eye opening. How should the nurse document this level of consciousness?", "opts": ["Confusion", "Coma", "Obtundation", "Stupor"], "ans": 3, "exp": "Stupor is a condition of deep sleep or unresponsiveness from which a person can only be aroused by vigorous and repeated stimulation. Confusion involves impaired judgment without this depth of unresponsiveness; coma involves no response to any stimuli at all (including deep pain); obtundation is a milder reduction in arousal with some limited response to the environment."}, {"q": "A patient sustains a severe head injury and develops deep, rapid, but otherwise regular breathing. What term should the nurse use to document this?", "opts": ["Gasping", "Ataxic breathing", "Apneusis", "Central neurogenic hyperventilation"], "ans": 3, "exp": "Central neurogenic hyperventilation is a sustained, deep, rapid, but regular pattern of breathing (hyperpnea), typically associated with midbrain or upper pons injury such as from uncal herniation. Gasping involves deep, all-or-none breaths with a slow rate; ataxic breathing is completely irregular; apneusis involves prolonged inspiratory pauses."}, {"q": "A patient presents to the ER with excessive vomiting. A CT scan reveals a mass pressing on a brain structure. Which structure is most directly responsible for triggering vomiting?", "opts": ["Area of skull fracture", "Thalamus", "Medulla oblongata", "Frontal lobe"], "ans": 2, "exp": "Vomiting results from disruption of the medulla oblongata, which houses the emetic (vomiting) center. The thalamus is involved in other functions such as temperature regulation, and the frontal lobe is more associated with emotional and executive processing."}, {"q": "A patient with intact thought content and arousal cannot communicate through speech or body movement but remains fully conscious. What condition is this?", "opts": ["Cerebral death", "Locked-in syndrome", "Dysphagia", "Cerebellar motor syndrome"], "ans": 1, "exp": "Locked-in syndrome occurs when an individual cannot communicate through speech or body movement but is fully conscious with intact cognitive function, typically from a lesion affecting the ventral pons. Cerebral death involves coma with eyes closed and no cognitive function; dysphagia refers to speech/swallowing difficulty; cerebellar motor syndrome involves coordination problems."}, {"q": "A patient has memory loss for events that occurred before a head injury, while new memory formation remains intact. What is this cognitive disorder?", "opts": ["Selective memory deficit", "Anterograde amnesia", "Retrograde amnesia", "Executive memory deficit"], "ans": 2, "exp": "Retrograde amnesia is manifested by loss of past personal history or factual memories occurring before the injury. Anterograde amnesia, by contrast, is the inability to form new memories going forward. Selective memory deficit involves inattention to stimuli, and executive memory deficit involves failure to stay alert and oriented."}, {"q": "A 65-year-old who recently had a stroke can no longer recognize and identify objects by touch, due to injury of the sensory cortex. How should the nurse document this finding?", "opts": ["Hypomimesis", "Agnosia", "Dysphasia", "Echolalia"], "ans": 1, "exp": "Agnosia is the failure to recognize the form and nature of objects, which can occur through any sensory modality (including touch, as in this case) when the relevant association cortex is damaged. Hypomimesis is a disorder of communication; dysphasia is impaired language comprehension; echolalia is the repetition of others' speech."}, {"q": "A patient experiences a stroke and now has difficulty writing and producing language. This presentation is most likely caused by occlusion of which artery?", "opts": ["Anterior communicating artery", "Posterior communicating artery", "Circle of Willis", "Middle cerebral artery"], "ans": 3, "exp": "Occlusion of the (typically left) middle cerebral artery leads to the inability to find words and difficulty with writing, since this artery supplies the language centers in the dominant hemisphere. The communicating arteries and circle of Willis are not specifically associated with this presentation."}, {"q": "A patient with chronic alcohol use disorder is admitted with delirium, inability to concentrate, and easy distractibility. What term should be used to document this state?", "opts": ["Acute confusional state", "Echolalia", "Dementia", "Dysphagia"], "ans": 0, "exp": "Delirium and inability to concentrate are characteristics of an acute confusional state—a transient disorder of cognitive function, consciousness, and perception. Dementia involves more permanent loss of recent and remote memory; echolalia is repetition of speech; dysphagia is difficulty speaking or swallowing."}, {"q": "A patient is experiencing increased intracranial pressure. What direct physiologic consequence results from this increase?", "opts": ["Brain tissue hypoxia", "Intracranial hypotension", "Ventricular swelling as a direct cause", "Expansion of the cranial vault"], "ans": 0, "exp": "Increased intracranial pressure compresses brain tissue and impairs adequate blood flow, resulting in brain tissue hypoxia. It leads to intracranial hypertension (not hypotension), and while ventricular swelling can contribute to raising ICP, increased ICP does not itself cause ventricular swelling or expand the rigid cranial vault."}, {"q": "A patient is admitted with a severe closed head injury. An intraventricular catheter records ICP at 24 mm Hg. How should the nurse interpret this reading?", "opts": ["Higher than normal", "Lower than normal", "Normal", "Borderline"], "ans": 0, "exp": "Normal ICP is 1-15 mm Hg; a reading of 24 mm Hg is higher than normal and reflects increased intracranial pressure requiring close monitoring and intervention."}, {"q": "A 70-year-old with a severe closed head injury develops small, sluggish pupils, widening pulse pressure, and bradycardia 48 hours after injury. Which stage of intracranial hypertension do these findings represent?", "opts": ["Stage 1", "Stage 2", "Stage 3", "Stage 4"], "ans": 2, "exp": "Stage 3 intracranial hypertension is characterized by decreasing levels of arousal or central neurogenic hyperventilation, widened pulse pressure, bradycardia, and small, sluggish pupils. Stage 1 shows few symptoms due to effective compensation; Stage 2 shows subtle, transient symptoms; Stage 4 is marked by complete cessation of cerebral blood flow."}, {"q": "An infant is diagnosed with noncommunicating hydrocephalus. What is an immediate priority concern for this patient?", "opts": ["Metabolic edema", "Interstitial edema", "Vasogenic edema", "Ischemic edema"], "ans": 1, "exp": "An immediate concern in noncommunicating (obstructive) hydrocephalus is interstitial edema, resulting from transependymal movement of CSF from the obstructed, dilated ventricles into the surrounding brain tissue. Metabolic, vasogenic, and ischemic edema are not characteristic findings of this condition."}, {"q": "A 16-year-old male falls off a truck bed and hits his forehead. He now shows resistance to passive movement that varies proportionally with the force applied. What is he most likely experiencing?", "opts": ["Spasticity", "Paratonia", "Rigidity", "Dystonia"], "ans": 1, "exp": "Paratonia is manifested by resistance to passive movement that varies in direct proportion to the force applied—commonly seen with diffuse cortical/frontal lobe injury. This differs from spasticity (velocity-dependent resistance that suddenly gives way), rigidity (uniform resistance regardless of force), and dystonia (sustained twisting movements)."}, {"q": "A patient reports tiring easily, difficulty rising from a sitting position, and inability to stand on their toes. What diagnosis would the nurse expect?", "opts": ["Parkinson disease", "Hypotonia", "Huntington disease", "Paresis"], "ans": 1, "exp": "These findings are classic for hypotonia (decreased muscle tone), which causes asthenia and the specific functional limitations described. Parkinson disease instead presents with rigidity, Huntington disease with excessive movement, and paresis with partial weakness rather than this clinical pattern of low tone."}, {"q": "A patient has paralysis of both legs. What type of paralysis is this?", "opts": ["Paraplegia", "Quadriplegia", "Infra paraplegia", "Paresthesia"], "ans": 0, "exp": "Paraplegia is paralysis of both legs. Quadriplegia involves all four extremities; \"infra paraplegia\" is not a recognized clinical term; paresthesia refers to abnormal sensation, not paralysis."}, {"q": "A patient has excessive, uncontrolled movement. What disorder will the nurse see documented on the chart?", "opts": ["Hypokinesia", "Akinesia", "Hyperkinesia", "Dyskinesia"], "ans": 2, "exp": "Excessive movement is the definition of hyperkinesia. Hypokinesia is decreased movement, akinesia is loss of movement altogether, and dyskinesia refers more broadly to abnormal (not necessarily excessive) movement."}, {"q": "A 40-year-old male has uncontrolled excessive movement beginning in the face and arms, eventually affecting the entire body, along with progressive intellectual decline. What is the most likely diagnosis?", "opts": ["Tardive dyskinesia", "Huntington disease", "Hypokinesia", "Alzheimer disease"], "ans": 1, "exp": "Huntington disease is manifested by chorea—abnormal movement beginning in the face and arms and eventually affecting the entire body—along with progressive dysfunction of intellectual and thought processes. Tardive dyskinesia involves stereotypic movements like lip smacking and tongue protrusion, typically from antipsychotic use; hypokinesia is a loss (not excess) of movement; Alzheimer disease primarily causes cognitive decline with motor impairment only in later stages."}, {"q": "A nurse observes a patient walking with the leg extended and held stiff, scraping the floor. What type of gait is this?", "opts": ["Spastic gait", "Cerebellar gait", "Basal ganglion gait", "Scissors gait"], "ans": 0, "exp": "This is a spastic gait, in which the leg is held extended and stiff, causing it to scrape the floor surface. A cerebellar gait is wide-based for stability; a basal ganglion gait involves small steps with reduced arm swing; a scissors gait involves the legs crossing due to bilateral spasticity."}, {"q": "A patient with a severe closed head injury presents with all four extremities in rigid extension, hyperpronated forearms, and legs in plantar extension. How should the nurse chart this?", "opts": ["Decorticate posturing", "Decerebrate posturing", "Dystonic posturing", "Basal ganglion posturing"], "ans": 1, "exp": "This is decerebrate posturing—rigid extension of all four extremities with hyperpronation of the forearms and plantar extension of the feet—indicating a more severe, lower brainstem-level injury than decorticate posturing."}, {"q": "A patient's primary care provider states the patient is experiencing vasogenic edema. Why is this clinically significant?", "opts": ["It usually has an infectious cause", "The blood-brain barrier is disrupted", "ICP is excessively high compared to other edema types", "It always causes herniation"], "ans": 1, "exp": "Vasogenic edema is clinically important because the blood-brain barrier is disrupted, allowing plasma proteins to leak into the extracellular space and draw additional fluid with them. It is not inherently infectious, does not always raise ICP more than other edema types, and does not always progress to herniation."}, {"q": "Progress notes describe the cerebellar tonsil shifting through the foramen magnum due to posterior fossa pressure. What type of herniation is this?", "opts": ["Supratentorial herniation", "Central herniation", "Cingulate gyrus herniation", "Infratentorial herniation"], "ans": 3, "exp": "This describes infratentorial herniation, in which the cerebellar tonsil shifts through the foramen magnum because of increased pressure within the posterior fossa—a life-threatening event that can compress the brainstem and disrupt cardiorespiratory centers."}, {"q": "An adult is diagnosed with communicating hydrocephalus. What is the most common underlying cause in adults?", "opts": ["Overproduction of CSF", "Intercellular edema", "Elevated arterial blood pressure", "Defective CSF reabsorption"], "ans": 3, "exp": "Communicating hydrocephalus in adults is most often caused by defective CSF reabsorption (typically at the arachnoid villi), rather than by overproduction of CSF, intercellular edema, or elevated blood pressure."}], "color": "c16"}, {"title": "The Cranial Nerves", "code": "Cranial Nerves", "subtitle": "All 12 Pairs — Function, Testing & Clinical Lesions", "general": [{"q": "How many pairs of cranial nerves arise directly from the brain (rather than the spinal cord)?", "opts": ["10 pairs", "12 pairs", "31 pairs", "8 pairs"], "ans": 1, "exp": "There are 12 pairs of cranial nerves, numbered I through XII (using Roman numerals) according to their location from anterior/superior to posterior/inferior on the brain and brainstem. This differs from the 31 pairs of spinal nerves that arise from the spinal cord."}, {"q": "Which classic mnemonic helps students remember which cranial nerves are purely sensory, purely motor, or both (mixed)?", "opts": ["\"Some Say Marry Money, But My Brother Says Big Brains Matter Most\"", "\"On Old Olympus's Towering Top, A Finn And German Viewed Some Hops\"", "\"All People Enjoy Sitting Closely\"", "\"Every Good Boy Does Fine\""], "ans": 0, "exp": "\"Some Say Marry Money, But My Brother Says Big Brains Matter Most\" is a classic mnemonic for Sensory, Motor, or Both for CN I-XII respectively. \"On Old Olympus's Towering Top...\" instead helps recall the NAMES of the nerves in order, not their function type."}, {"q": "Cranial nerves III, IV, and VI all share which common general function?", "opts": ["Taste sensation", "Control of extraocular eye movement", "Hearing", "Facial sensation"], "ans": 1, "exp": "The oculomotor (III), trochlear (IV), and abducens (VI) nerves all innervate extraocular muscles that control eye movement and, in the case of CN III, pupillary constriction and eyelid elevation. Damage to any of these produces specific patterns of diplopia (double vision) and abnormal eye position."}, {"q": "Which cranial nerve is responsible for carrying parasympathetic fibers to the majority of the body's internal organs (heart, lungs, and most of the GI tract)?", "opts": ["Cranial nerve VII (facial)", "Cranial nerve IX (glossopharyngeal)", "Cranial nerve X (vagus)", "Cranial nerve XI (accessory)"], "ans": 2, "exp": "The vagus nerve (CN X) is the primary parasympathetic supply to the thoracic and most of the abdominal viscera, earning it the nickname \"the wandering nerve\" because of its extensive distribution well beyond the head and neck."}, {"q": "Which cranial nerves are classified as purely sensory, with no motor component?", "opts": ["CN III, IV, VI", "CN I, II, and VIII", "CN V, VII, IX, X", "CN XI and XII"], "ans": 1, "exp": "The olfactory (I), optic (II), and vestibulocochlear (VIII) nerves are purely sensory, carrying smell, vision, and hearing/balance information respectively, with no motor fibers. Many other cranial nerves, such as V, VII, IX, and X, are mixed (both sensory and motor)."}], "clinical": [{"q": "A patient reports a gradual loss of the sense of smell following a basilar skull fracture. Which cranial nerve is most likely affected?", "opts": ["CN I (olfactory)", "CN II (optic)", "CN V (trigeminal)", "CN VII (facial)"], "ans": 0, "exp": "The olfactory nerve (CN I) carries smell sensation from receptors in the nasal mucosa through the cribriform plate to the olfactory bulb. Basilar skull fractures can shear these delicate fibers as they pass through the cribriform plate, causing anosmia (loss of smell)."}, {"q": "A nurse is testing cranial nerve I. Which assessment technique is most appropriate?", "opts": ["Asking the patient to identify a familiar scent (such as coffee) with eyes closed, testing each nostril separately", "Shining a penlight into each eye and observing pupillary response", "Asking the patient to clench their jaw while palpating the masseter muscle", "Asking the patient to shrug their shoulders against resistance"], "ans": 0, "exp": "CN I (olfactory) is assessed by having the patient close their eyes and identify a familiar, non-irritating scent presented to one nostril at a time while occluding the other. Pupillary response tests CN II/III, jaw clenching tests CN V, and shoulder shrug against resistance tests CN XI."}, {"q": "A patient with a frontal lobe meningioma reports a one-sided loss of smell along with subtle personality changes. Which nerve's superficial location along the base of the frontal lobe makes it vulnerable to this type of tumor?", "opts": ["CN I (olfactory)", "CN II (optic)", "CN III (oculomotor)", "CN V (trigeminal)"], "ans": 0, "exp": "The olfactory bulb and tract (CN I) lie along the undersurface of the frontal lobe, making them vulnerable to compression by frontal lobe or olfactory groove meningiomas, which can cause unilateral anosmia along with frontal lobe signs such as personality change as the tumor grows."}, {"q": "A patient reports that food tastes \"bland\" and unappealing since a recent head cold. The nurse explains this is most likely related to which cranial nerve, given its close functional relationship with overall flavor perception?", "opts": ["CN I (olfactory), since smell contributes heavily to the overall perception of flavor", "CN XI (accessory)", "CN IV (trochlear)", "CN VI (abducens)"], "ans": 0, "exp": "Although taste itself is carried by CN VII, IX, and X, the olfactory nerve (CN I) contributes heavily to the overall perception of flavor; nasal congestion or olfactory nerve dysfunction (such as after a viral upper respiratory infection) commonly causes food to taste \"bland\" even when the taste buds themselves are unaffected."}, {"q": "A patient with a pituitary tumor develops bitemporal hemianopia (loss of the outer/temporal visual fields in both eyes). Which structure is most likely compressed?", "opts": ["The optic chiasm, where CN II fibers cross", "The oculomotor nerve (CN III)", "The trochlear nerve (CN IV)", "The abducens nerve (CN VI)"], "ans": 0, "exp": "The optic chiasm, where fibers of the optic nerve (CN II) from the nasal half of each retina cross to the opposite side, sits just above the pituitary gland. A pituitary tumor compressing the chiasm classically causes bitemporal hemianopia, since it disrupts the crossing fibers responsible for peripheral (temporal) vision in both eyes."}, {"q": "Which assessment is used to evaluate the function of CN II (optic nerve)?", "opts": ["Visual acuity (Snellen chart) and visual field testing", "Pupillary light reflex only", "Hearing assessment with a tuning fork", "Asking the patient to follow a moving finger"], "ans": 0, "exp": "CN II is assessed primarily through visual acuity testing (such as a Snellen chart) and visual field confrontation testing. While the pupillary light reflex does require an intact CN II as its sensory (afferent) limb, the motor (efferent) response is carried by CN III, making this a combined test of both nerves rather than CN II alone."}, {"q": "A patient's CT scan shows a lesion damaging cranial nerve II. What deficit should the nurse expect?", "opts": ["Loss of vision or visual field deficit in the affected eye", "Inability to move the eye laterally", "Drooping of the eyelid (ptosis)", "Loss of facial sensation"], "ans": 0, "exp": "The optic nerve (CN II) carries visual information from the retina to the brain; damage produces vision loss or visual field deficits in the affected eye. Ptosis and limited eye movement instead suggest CN III dysfunction, since CN II carries no motor fibers to the extraocular muscles or eyelid."}, {"q": "A patient presents with a dilated, fixed pupil unresponsive to light, ptosis (drooping eyelid), and the eye deviated 'down and out.' Which cranial nerve is affected?", "opts": ["CN II (optic)", "CN III (oculomotor)", "CN IV (trochlear)", "CN VI (abducens)"], "ans": 1, "exp": "CN III (oculomotor) palsy classically produces a dilated, nonreactive pupil (loss of parasympathetic fibers controlling constriction), ptosis (loss of levator palpebrae innervation), and a characteristic 'down and out' eye position because the unopposed actions of the lateral rectus (CN VI) and superior oblique (CN IV) muscles dominate."}, {"q": "Besides controlling most extraocular eye movements, which additional function does CN III (oculomotor) serve?", "opts": ["Hearing", "Parasympathetic innervation causing pupillary constriction and lens accommodation", "Taste sensation on the anterior tongue", "Sensation to the face"], "ans": 1, "exp": "In addition to motor innervation of most extraocular muscles and the levator palpebrae superioris (eyelid elevation), CN III carries parasympathetic fibers responsible for pupillary constriction and lens accommodation for near vision."}, {"q": "Compression of cranial nerve III by an expanding mass or aneurysm is a neurologic emergency primarily because it can also indicate which life-threatening process?", "opts": ["Impending uncal/transtentorial herniation compressing the brainstem", "A simple migraine variant", "Benign positional vertigo", "Routine age-related pupil changes"], "ans": 0, "exp": "Because CN III runs close to the tentorial notch, a new, isolated, dilated, nonreactive pupil ('blown pupil') in a patient with altered consciousness is a classic warning sign of uncal (transtentorial) herniation compressing the nerve and brainstem—requiring immediate intervention."}, {"q": "A patient reports double vision (diplopia) that is worse when looking down, such as when reading or descending stairs. Which cranial nerve palsy is most consistent with this complaint?", "opts": ["CN III palsy", "CN IV (trochlear) palsy", "CN VI palsy", "CN VIII palsy"], "ans": 1, "exp": "CN IV (trochlear) innervates the superior oblique muscle, which helps the eye look downward and inward. A trochlear nerve palsy classically causes vertical diplopia that worsens with downward gaze, such as when reading or walking down stairs, and patients often tilt their head to compensate."}, {"q": "Which muscle is innervated by the trochlear nerve (CN IV)?", "opts": ["Lateral rectus", "Superior oblique", "Medial rectus", "Inferior rectus"], "ans": 1, "exp": "The trochlear nerve (CN IV) innervates only the superior oblique muscle, which intorts the eye and assists with downward, inward eye movement. It is notable as the only cranial nerve that exits from the dorsal (posterior) surface of the brainstem and the one with the longest intracranial course."}, {"q": "A nurse is assessing extraocular movements in a patient. Which combined cranial nerve test is being performed when the patient is asked to follow a finger through the six cardinal positions of gaze?", "opts": ["CN III, IV, and VI together", "CN V and VII together", "CN IX and X together", "CN I alone"], "ans": 0, "exp": "Testing the six cardinal positions of gaze evaluates the combined function of CN III (oculomotor), CN IV (trochlear), and CN VI (abducens), since these three nerves work together to control all directions of eye movement."}, {"q": "Damage isolated to CN IV would be expected to cause which specific finding, distinct from a CN III palsy?", "opts": ["A fully dilated, nonreactive pupil", "Subtle vertical/torsional diplopia without ptosis or pupil involvement", "Complete inability to open the eyelid", "Loss of lateral eye movement"], "ans": 1, "exp": "Because CN IV only innervates the superior oblique muscle and carries no parasympathetic or eyelid-related fibers, an isolated CN IV palsy produces subtle vertical or torsional diplopia without the ptosis or pupillary involvement seen in CN III palsy."}, {"q": "A patient is unable to move the affected eye laterally (outward) past the midline, and the eye is deviated medially ('inward') at rest. Which cranial nerve is most likely affected?", "opts": ["CN III (oculomotor)", "CN IV (trochlear)", "CN VI (abducens)", "CN VII (facial)"], "ans": 2, "exp": "CN VI (abducens) innervates the lateral rectus muscle, the only muscle responsible for abducting (moving outward) the eye. A CN VI palsy causes an inward (medial) deviation of the affected eye at rest, since the unopposed medial rectus (innervated by CN III) pulls the eye inward, along with inability to move the eye past midline laterally."}, {"q": "Why is an isolated CN VI palsy sometimes considered a nonspecific or 'false localizing' sign of increased intracranial pressure, rather than a sign of a focal lesion exactly where the nerve appears to be affected?", "opts": ["CN VI has an unusually long intracranial course, making it vulnerable to stretching from generalized increases in ICP from anywhere in the cranium", "CN VI is never affected by increased intracranial pressure", "CN VI palsy always indicates a tumor directly on the nerve", "CN VI runs entirely outside the skull, so ICP cannot affect it"], "ans": 0, "exp": "CN VI has one of the longest intracranial courses of any cranial nerve, running along the base of the skull before entering the orbit. This long course makes it especially vulnerable to stretching or compression from globally increased intracranial pressure, even when the underlying problem is not located near the nerve itself—hence the term \"false localizing sign.\""}, {"q": "Which muscle does cranial nerve VI (abducens) innervate, and what eye movement does it produce?", "opts": ["The lateral rectus, producing outward (abduction) eye movement", "The superior oblique, producing downward/inward movement", "The medial rectus, producing inward eye movement", "The levator palpebrae, producing eyelid elevation"], "ans": 0, "exp": "CN VI (abducens) innervates only the lateral rectus muscle, which abducts (moves outward) the eye. This is reflected in the nerve's name: \"abducens\" relates to abduction of the eye."}, {"q": "A patient with trigeminal neuralgia experiences sudden, severe, shock-like facial pain. Which cranial nerve is involved?", "opts": ["CN V (trigeminal)", "CN VII (facial)", "CN IX (glossopharyngeal)", "CN X (vagus)"], "ans": 0, "exp": "Trigeminal neuralgia involves CN V (trigeminal), the primary sensory nerve for facial sensation, often caused by vascular compression of the nerve root, producing brief but intense, shock-like episodes of facial pain along one or more of its three branches (ophthalmic, maxillary, mandibular)."}, {"q": "Which combination of functions does cranial nerve V (trigeminal) provide?", "opts": ["Sensation to the face and motor control of the muscles of mastication (chewing)", "Taste only", "Motor control of facial expression only", "Hearing and balance"], "ans": 0, "exp": "CN V is a mixed nerve providing sensory innervation to the face (via its ophthalmic, maxillary, and mandibular branches) and motor innervation to the muscles of mastication (temporalis, masseter, and pterygoids), allowing the patient to chew and clench the jaw."}, {"q": "A nurse tests the corneal reflex by lightly touching the cornea with a wisp of cotton. Which cranial nerve provides the afferent (sensory) limb of this reflex?", "opts": ["CN V (trigeminal)", "CN VI (abducens)", "CN VII (facial)", "CN VIII (vestibulocochlear)"], "ans": 0, "exp": "The corneal reflex's afferent (sensory) limb is carried by the ophthalmic branch of CN V, which detects the touch stimulus on the cornea. The efferent (motor) limb, causing the blink response, is carried by CN VII (facial nerve), making this another combined cranial nerve test."}, {"q": "A patient with a lesion affecting CN V reports an absent corneal blink reflex along with facial numbness on the same side. Where is sensation to the lower jaw and chin specifically carried?", "opts": ["Ophthalmic branch (V1)", "Maxillary branch (V2)", "Mandibular branch (V3)", "All three branches equally"], "ans": 2, "exp": "The mandibular branch (V3) of the trigeminal nerve carries sensation from the lower jaw, chin, and lower teeth, as well as motor fibers to the muscles of mastication. V1 (ophthalmic) covers the forehead/cornea, and V2 (maxillary) covers the cheek/upper jaw."}, {"q": "A patient presents with unilateral facial droop, inability to close one eye completely, and loss of taste on the anterior two-thirds of the tongue on the affected side. Which cranial nerve is involved?", "opts": ["CN V (trigeminal)", "CN VII (facial)", "CN IX (glossopharyngeal)", "CN XII (hypoglossal)"], "ans": 1, "exp": "CN VII (facial nerve) controls the muscles of facial expression (explaining the droop and inability to close the eye) and also carries taste sensation from the anterior two-thirds of the tongue. This combination of findings is classic for facial nerve palsy, such as Bell palsy."}, {"q": "A patient with Bell palsy is unable to wrinkle the forehead on the affected side, distinguishing it from a stroke. Why is forehead involvement significant in distinguishing a peripheral CN VII lesion from a central (cortical) lesion?", "opts": ["The forehead muscles receive bilateral cortical innervation, so only a peripheral (nuclear or nerve) lesion affects them", "The forehead has no motor innervation at all", "Forehead movement is controlled by CN V, not CN VII", "Central lesions always affect the forehead but never the lower face"], "ans": 0, "exp": "The upper facial muscles (forehead) receive bilateral cortical (upper motor neuron) innervation, while the lower face receives only contralateral innervation. A central (stroke) lesion therefore typically spares the forehead (forehead wrinkling preserved) while a peripheral lesion like Bell palsy affects the entire side of the face, including the forehead."}, {"q": "Which combination of functions is correctly attributed to CN VII?", "opts": ["Motor to facial expression muscles, taste to the anterior two-thirds of the tongue, and parasympathetic fibers to salivary/lacrimal glands", "Motor to the muscles of mastication only", "Pure sensory nerve for facial sensation", "Motor to the tongue muscles for speech"], "ans": 0, "exp": "CN VII (facial) is a complex mixed nerve: it provides motor innervation to the muscles of facial expression, carries special taste sensation from the anterior two-thirds of the tongue, and supplies parasympathetic fibers to the salivary and lacrimal glands."}, {"q": "A 52-year-old reports progressive hearing loss in one ear along with new-onset tinnitus and unsteadiness. An MRI reveals an acoustic neuroma. Which cranial nerve does this tumor most directly affect?", "opts": ["CN VII (facial)", "CN VIII (vestibulocochlear)", "CN IX (glossopharyngeal)", "CN X (vagus)"], "ans": 1, "exp": "An acoustic neuroma (vestibular schwannoma) arises from the Schwann cells of CN VIII (vestibulocochlear), classically producing unilateral sensorineural hearing loss, tinnitus, and balance/gait disturbance from involvement of both the cochlear (hearing) and vestibular (balance) divisions of the nerve."}, {"q": "Which two distinct sensory functions are carried by cranial nerve VIII?", "opts": ["Taste and smell", "Hearing and balance/equilibrium", "Facial sensation and vision", "Pain and temperature from the face"], "ans": 1, "exp": "CN VIII (vestibulocochlear) has two divisions: the cochlear division carries hearing information from the Organ of Corti, and the vestibular division carries balance/equilibrium information from the semicircular canals and otolithic organs of the inner ear."}, {"q": "A nurse performs the Weber and Rinne tests with a tuning fork on a patient with reported hearing changes. Which cranial nerve is being assessed?", "opts": ["CN VII", "CN VIII", "CN IX", "CN XI"], "ans": 1, "exp": "The Weber and Rinne tests use a vibrating tuning fork to distinguish between conductive and sensorineural hearing loss, directly assessing the cochlear division of CN VIII (vestibulocochlear nerve)."}, {"q": "A patient with damage to the vestibular division of CN VIII reports a specific symptom distinct from hearing loss. Which symptom is this?", "opts": ["Loss of taste", "Vertigo and imbalance", "Facial numbness", "Difficulty swallowing"], "ans": 1, "exp": "The vestibular division of CN VIII carries balance and spatial orientation information; damage to this division (rather than the cochlear division) produces vertigo, dizziness, and imbalance rather than hearing loss, which would instead point to cochlear division involvement."}, {"q": "A patient who recently had a tonsillectomy reports loss of taste on the posterior third of the tongue and difficulty with the gag reflex. Which cranial nerve was most likely affected during surgery?", "opts": ["CN VII (facial)", "CN IX (glossopharyngeal)", "CN X (vagus)", "CN XII (hypoglossal)"], "ans": 1, "exp": "CN IX (glossopharyngeal) carries taste sensation from the posterior third of the tongue and provides the sensory (afferent) limb of the gag reflex, along with sensation from the pharynx; it runs close to the tonsillar area and can be affected during tonsillectomy."}, {"q": "When testing the gag reflex, which two cranial nerves are involved in the afferent (sensory) and efferent (motor) limbs, respectively?", "opts": ["CN IX (afferent/sensory) and CN X (efferent/motor)", "CN VII (afferent) and CN V (efferent)", "CN VIII (afferent) and CN XI (efferent)", "CN XII (afferent) and CN IX (efferent)"], "ans": 0, "exp": "The gag reflex relies on CN IX (glossopharyngeal) as the sensory (afferent) limb, detecting the stimulus at the back of the throat, and CN X (vagus) as the motor (efferent) limb, producing the pharyngeal muscle contraction (gag)."}, {"q": "CN IX (glossopharyngeal) also plays a critical role in cardiovascular regulation through which structure?", "opts": ["The carotid sinus and carotid body baroreceptors/chemoreceptors", "The cardiac SA node directly", "The adrenal medulla", "The renal artery baroreceptors"], "ans": 0, "exp": "CN IX carries sensory information from the carotid sinus (baroreceptor, monitoring blood pressure) and carotid body (chemoreceptor, monitoring blood oxygen/CO2/pH), relaying this data to the brainstem to help regulate heart rate and blood pressure."}, {"q": "A patient with a brainstem stroke develops hoarseness, difficulty swallowing, and a drooping soft palate on one side, with the uvula deviating to the unaffected side. Which cranial nerve is most likely involved?", "opts": ["CN VIII (vestibulocochlear)", "CN IX (glossopharyngeal)", "CN X (vagus)", "CN XI (accessory)"], "ans": 2, "exp": "CN X (vagus) innervates the muscles of the soft palate, pharynx, and larynx. A unilateral vagus nerve lesion causes the uvula to deviate AWAY from the affected side (toward the normal side) on phonation, along with hoarseness (laryngeal muscle weakness) and dysphagia (pharyngeal weakness)."}, {"q": "Beyond its role in speech and swallowing, CN X (vagus) provides parasympathetic innervation to which body systems?", "opts": ["Only the muscles of the eye", "The heart, lungs, and most of the gastrointestinal tract", "Only the skeletal muscles of the neck", "Only the salivary glands"], "ans": 1, "exp": "The vagus nerve (CN X) is the major parasympathetic supply to the thoracic and abdominal viscera, slowing heart rate, constricting bronchi, and stimulating GI motility and secretion—reflecting its extensive \"wandering\" distribution throughout the body."}, {"q": "A patient undergoing carotid surgery is at risk for inadvertent vagus nerve stimulation. Which acute cardiovascular effect should the nurse anticipate if this occurs?", "opts": ["Tachycardia and hypertension", "Bradycardia and hypotension", "No cardiovascular effect, since CN X has no cardiac role", "Sudden cardiac arrest only, with no warning signs"], "ans": 1, "exp": "Because the vagus nerve provides parasympathetic input to the heart (slowing the SA node and AV conduction), inadvertent stimulation or compression during procedures near the carotid sheath can trigger a vagal response, causing bradycardia and hypotension."}, {"q": "A patient is unable to shrug the shoulders against resistance and has weakness turning the head to one side. Which cranial nerve is responsible for these movements?", "opts": ["CN IX (glossopharyngeal)", "CN X (vagus)", "CN XI (accessory)", "CN XII (hypoglossal)"], "ans": 2, "exp": "CN XI (spinal accessory) innervates the trapezius (shoulder shrug) and sternocleidomastoid (head turning/rotation) muscles. Testing involves asking the patient to shrug against resistance and turn their head against resistance on each side."}, {"q": "When testing CN XI by asking the patient to turn their head against resistance, weakness turning the head to the LEFT indicates a lesion of which sternocleidomastoid muscle?", "opts": ["The left sternocleidomastoid", "The right sternocleidomastoid", "Both sternocleidomastoid muscles equally", "Neither, since the trapezius alone controls this movement"], "ans": 1, "exp": "Each sternocleidomastoid muscle rotates the head to the OPPOSITE side when it contracts; the right sternocleidomastoid turns the head to the left. Therefore, weakness turning the head to the left indicates a problem with the right sternocleidomastoid (and its CN XI innervation)."}, {"q": "Unlike most cranial nerves, CN XI (accessory) has a unique anatomical origin. Which statement correctly describes this?", "opts": ["It arises entirely from the cervical spinal cord with no cranial root", "It has both a cranial root (from the medulla) and a spinal root (from the upper cervical spinal cord)", "It arises only from the thoracic spinal cord", "It is not actually a cranial nerve but a branch of CN X"], "ans": 1, "exp": "The accessory nerve (CN XI) has a unique dual origin: a cranial root from the medulla (which largely joins and travels with CN X) and a spinal root arising from the upper cervical spinal cord (C1-C5), which provides the primary motor supply to the trapezius and sternocleidomastoid."}, {"q": "A nurse asks a patient to stick out their tongue and observes that it deviates to the right side, with visible atrophy and fasciculations on that side. Which cranial nerve is affected, and on which side?", "opts": ["Right CN XII (hypoglossal)", "Left CN XII (hypoglossal)", "Right CN IX (glossopharyngeal)", "Left CN VII (facial)"], "ans": 0, "exp": "CN XII (hypoglossal) innervates the muscles of the tongue. With a lower motor neuron lesion of CN XII, the tongue deviates TOWARD the side of the lesion when protruded (the unaffected side's genioglossus muscle pushes it that direction), so deviation to the right indicates a right-sided CN XII lesion, often with atrophy and fasciculations on the same (affected) side."}, {"q": "Which primary function does cranial nerve XII (hypoglossal) serve?", "opts": ["Taste sensation on the tongue", "Motor control of tongue movement for speech and swallowing", "Sensation to the tongue", "Salivary gland secretion"], "ans": 1, "exp": "CN XII (hypoglossal) is a purely motor nerve controlling the intrinsic and extrinsic muscles of the tongue, essential for the fine movements needed for articulate speech and for manipulating food during chewing and swallowing. Taste and general sensation to the tongue are instead carried by CN VII, IX, and X depending on the region."}, {"q": "A patient with a neurodegenerative disease affecting CN XII bilaterally develops slurred speech (dysarthria) and difficulty manipulating food in the mouth. What pattern would the nurse expect on tongue protrusion testing?", "opts": ["Deviation to one side only", "A tongue that cannot protrude symmetrically and may show bilateral atrophy/fasciculations", "Normal tongue movement with preserved strength", "Inability to taste sweet and salty flavors"], "ans": 1, "exp": "Bilateral CN XII involvement (as can occur in conditions like ALS) impairs tongue protrusion and strength symmetrically rather than producing a one-sided deviation, often with visible bilateral atrophy and fasciculations, contributing to dysarthria and difficulty with the oral phase of swallowing."}], "color": "c17"}]
</script>
<script>
const CHAPTERS = JSON.parse(document.getElementById('chapters-data').textContent);

const CN_GRAPHIC = `<div class="cn-graphic"><div class="cn-graphic-title">The twelve cranial nerves</div><div class="cn-graphic-sub">Numbered in order of origin from the brain, front to back</div><div class="cn-legend"><div class="cn-legend-item"><span class="cn-dot sensory"></span>Sensory only</div><div class="cn-legend-item"><span class="cn-dot motor"></span>Motor only</div><div class="cn-legend-item"><span class="cn-dot mixed"></span>Mixed (sensory + motor)</div></div><div class="cn-grid"><div class="cn-card"><div class="cn-num sensory">I</div><div class="cn-info"><div class="cn-name">Olfactory</div><div class="cn-func">Smell</div></div></div><div class="cn-card"><div class="cn-num sensory">II</div><div class="cn-info"><div class="cn-name">Optic</div><div class="cn-func">Vision</div></div></div><div class="cn-card"><div class="cn-num motor">III</div><div class="cn-info"><div class="cn-name">Oculomotor</div><div class="cn-func">Eye movement, pupil constriction, eyelid</div></div></div><div class="cn-card"><div class="cn-num motor">IV</div><div class="cn-info"><div class="cn-name">Trochlear</div><div class="cn-func">Eye movement (superior oblique)</div></div></div><div class="cn-card"><div class="cn-num mixed">V</div><div class="cn-info"><div class="cn-name">Trigeminal</div><div class="cn-func">Face sensation, chewing muscles</div></div></div><div class="cn-card"><div class="cn-num motor">VI</div><div class="cn-info"><div class="cn-name">Abducens</div><div class="cn-func">Eye movement (lateral rectus)</div></div></div><div class="cn-card"><div class="cn-num mixed">VII</div><div class="cn-info"><div class="cn-name">Facial</div><div class="cn-func">Facial expression, taste (ant. 2/3 tongue)</div></div></div><div class="cn-card"><div class="cn-num sensory">VIII</div><div class="cn-info"><div class="cn-name">Vestibulocochlear</div><div class="cn-func">Hearing, balance</div></div></div><div class="cn-card"><div class="cn-num mixed">IX</div><div class="cn-info"><div class="cn-name">Glossopharyngeal</div><div class="cn-func">Throat sensation, taste, gag reflex</div></div></div><div class="cn-card"><div class="cn-num mixed">X</div><div class="cn-info"><div class="cn-name">Vagus</div><div class="cn-func">Heart, lungs, GI tract (parasympathetic)</div></div></div><div class="cn-card"><div class="cn-num motor">XI</div><div class="cn-info"><div class="cn-name">Accessory</div><div class="cn-func">Trapezius, sternocleidomastoid</div></div></div><div class="cn-card"><div class="cn-num motor">XII</div><div class="cn-info"><div class="cn-name">Hypoglossal</div><div class="cn-func">Tongue movement</div></div></div></div></div>`;

const state={scores:[],answered:[]};
CHAPTERS.forEach(()=>{state.scores.push({c:0,t:0});state.answered.push([]);});

function buildChapter(ci){
  const ch=CHAPTERS[ci];
  const el=document.getElementById('ch'+ci);
  const totalQ=ch.general.length+ch.clinical.length;
  let html=`<div class="ch-header" data-ch="${ci}"><span class="ch-tag">${ch.code}</span><h2>${ch.title}</h2><p>${ch.subtitle}</p></div>`;
  html+=`<div class="score-bar" id="sb${ci}" style="--accent:var(--${ch.color})"><div class="score-stat"><div class="val" id="sc${ci}">0/${totalQ}</div><div class="lbl">score</div></div><div class="score-divider"></div><div class="score-stat"><div class="val" id="pct${ci}">—</div><div class="lbl">correct</div></div><div class="score-divider"></div><div class="score-stat"><div class="val" id="ans${ci}">0</div><div class="lbl">answered</div></div><div class="progress-wrap"><div class="progress-label">Progress</div><div class="progress-track"><div class="progress-fill" id="prog${ci}" style="background:var(--${ch.color})"></div></div></div><button class="reset-btn" onclick="resetChapter(${ci})">↺ Reset</button></div>`;
  html+=`<div class="jump-nav"><button class="jump-btn" style="--hover-bg:var(--${ch.color}bg);--hover-bd:var(--${ch.color}bd);--hover-fg:var(--${ch.color})" onclick="document.getElementById('sec-general-${ci}').scrollIntoView({behavior:'smooth'})">↓ General Knowledge (${ch.general.length})</button><button class="jump-btn" style="--hover-bg:var(--${ch.color}bg);--hover-bd:var(--${ch.color}bd);--hover-fg:var(--${ch.color})" onclick="document.getElementById('sec-clinical-${ci}').scrollIntoView({behavior:'smooth'})">↓ Clinical Scenarios (${ch.clinical.length})</button></div>`;
  if(ch.code==='Cranial Nerves'){html+=CN_GRAPHIC;}
  html+=`<div class="section-divider" id="sec-general-${ci}"><div class="line"></div><div class="label">General knowledge — ${ch.general.length} questions</div><div class="line"></div></div>`;
  ch.general.forEach((q,qi)=>{html+=buildQ(ci,qi,q,'G',ch.color);});
  html+=`<div class="section-divider" id="sec-clinical-${ci}"><div class="line"></div><div class="label">Clinical scenarios — ${ch.clinical.length} questions</div><div class="line"></div></div>`;
  ch.clinical.forEach((q,qi)=>{html+=buildQ(ci,qi+ch.general.length,q,'C',ch.color);});
  el.innerHTML=html;
}

function buildQ(ci,gIdx,q,type,color){
  const badge=type==='C'?`<span class="q-badge badge-clinical" style="--badge-bg:var(--${color}bg);--badge-fg:var(--${color})">Clinical scenario</span>`:'<span class="q-badge badge-general">General knowledge</span>';
  const letters=['A','B','C','D'];
  const opts=q.opts.map((o,oi)=>`<button class="opt-btn" id="opt_${ci}_${gIdx}_${oi}" style="--hover-bg:var(--${color}bg);--hover-bd:var(--${color}bd);--hover-fg:var(--${color})" onclick="answer(${ci},${gIdx},${oi},${q.ans},${q.opts.length})"><span class="opt-letter">${letters[oi]}.</span><span>${o}</span></button>`).join('');
  return `<div class="q-card" id="qc_${ci}_${gIdx}"><div class="q-meta">${badge}<span class="q-num">Q${gIdx+1}</span></div><div class="q-text">${q.q}</div><div class="options">${opts}</div><div class="explanation" id="exp_${ci}_${gIdx}" style="--accent:var(--${color})">${q.exp}</div></div>`;
}

function answer(ci,gIdx,chosen,correct,numOpts){
  if(state.answered[ci].includes(gIdx))return;
  state.answered[ci].push(gIdx);
  for(let i=0;i<numOpts;i++){const b=document.getElementById(`opt_${ci}_${gIdx}_${i}`);if(b)b.disabled=true;}
  const cb=document.getElementById(`opt_${ci}_${gIdx}_${chosen}`);
  const rb=document.getElementById(`opt_${ci}_${gIdx}_${correct}`);
  if(chosen===correct){cb.classList.add('correct');state.scores[ci].c++;}
  else{cb.classList.add('wrong');rb.classList.add('reveal');}
  state.scores[ci].t++;
  const e=document.getElementById(`exp_${ci}_${gIdx}`);
  if(e)e.style.display='block';
  updateScore(ci);
}

function updateScore(ci){
  const ch=CHAPTERS[ci];
  const total=ch.general.length+ch.clinical.length;
  const s=state.scores[ci];
  document.getElementById(`sc${ci}`).textContent=`${s.c}/${total}`;
  document.getElementById(`ans${ci}`).textContent=s.t;
  const pct=s.t>0?Math.round((s.c/s.t)*100):null;
  document.getElementById(`pct${ci}`).textContent=pct!==null?pct+'%':'—';
  document.getElementById(`prog${ci}`).style.width=Math.round((s.t/total)*100)+'%';
}

function resetChapter(ci){
  state.scores[ci]={c:0,t:0};
  state.answered[ci]=[];
  buildChapter(ci);
}

function showChapter(idx){
  document.querySelectorAll('.chapter').forEach((s,i)=>s.classList.toggle('active',i===idx));
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{b.classList.toggle('active',i===idx);b.setAttribute('aria-selected',i===idx?'true':'false');});
  window.scrollTo({top:0,behavior:'smooth'});
}

CHAPTERS.forEach((_,i)=>buildChapter(i));
</script>
</body>
</html>
