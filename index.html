<style>

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.65;min-height:100vh}

  .site-header{background:linear-gradient(180deg,var(--navy) 0%,var(--navy-dark) 100%);padding:2rem 1.5rem 1.5rem;text-align:center}
  .site-header .eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#9FB8DD;margin-bottom:.5rem}
  .site-header h1{font-family:'DM Serif Display',serif;font-size:clamp(1.6rem,4vw,2.4rem);color:#FFFFFF;font-weight:400;line-height:1.2;margin-bottom:.5rem}
  .site-header .subtitle{font-size:13px;color:#9FB8DD}

  .tab-bar{position:sticky;top:0;z-index:100;background:var(--navy);border-bottom:1px solid var(--navy-dark);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}

  .tab-btn{flex-shrink:0;padding:.9rem 1.1rem;border:none;background:transparent;color:#9FB8DD;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}

  .tab-btn.active{color:#FFFFFF}

  .tab-btn[data-ch="1"].active{border-bottom-color:#7FBE6B}
  .tab-btn[data-ch="2"].active{border-bottom-color:#D29B5C}
  .tab-btn[data-ch="3"].active{border-bottom-color:#B58AD9}

  .main{max-width:780px;margin:0 auto;padding:1.5rem 1rem 4rem}

  .ch-header{margin-bottom:1.5rem;padding:1.25rem 1.5rem;background:var(--navy-pill);border-radius:var(--radius-lg);border:1px solid var(--navy-dark)}

  .ch-header h2{font-family:'DM Serif Display',serif;font-size:1.4rem;font-weight:400;margin-bottom:4px;line-height:1.25;color:#FFFFFF}
  .ch-header p{font-size:13px;color:#C9D8EE}

  .score-bar{display:flex;align-items:center;gap:1rem;padding:.875rem 1.25rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.5rem;flex-wrap:wrap;box-shadow:0 1px 2px rgba(30,42,68,.06)}
  .score-stat{text-align:center;min-width:52px}
  .score-stat .val{font-size:1.2rem;font-weight:600;color:var(--navy);line-height:1;font-feature-settings:"tnum"}
  .score-stat .lbl{font-size:11px;color:var(--text-faint);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
  .score-divider{width:1px;height:36px;background:var(--border)}
  .progress-wrap{flex:1;min-width:120px}
  .progress-label{font-size:11px;color:var(--text-faint);margin-bottom:4px}
  .progress-track{height:5px;background:var(--surface2);border-radius:4px;overflow:hidden}
  .progress-fill{height:100%;border-radius:4px;transition:width .4s ease;width:0%}
  .reset-btn{margin-left:auto;padding:6px 14px;border:1px solid var(--border-strong);border-radius:var(--radius);background:transparent;color:var(--text-muted);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s}

  .opt-btn.correct{background:var(--correct-bg)!important;border-color:var(--correct-bd)!important;color:var(--correct)!important}
  .opt-btn.correct .opt-letter{color:var(--correct)!important}
  .opt-btn.wrong{background:var(--wrong-bg)!important;border-color:var(--wrong-bd)!important;color:var(--wrong)!important}
  .opt-btn.wrong .opt-letter{color:var(--wrong)!important}
  .opt-btn.reveal{background:var(--correct-bg)!important;border-color:var(--correct-bd)!important;color:var(--correct)!important;opacity:.85}
  .opt-btn.reveal .opt-letter{color:var(--correct)!important}
  .explanation{display:none;margin-top:10px;padding:10px 13px;background:var(--surface2);border-radius:var(--radius);border-left:3px solid var(--accent);font-size:13px;line-height:1.65;color:var(--text-muted)}

  .jump-nav{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
  .jump-btn{padding:6px 14px;border:1px solid var(--border-strong);border-radius:20px;background:var(--surface);color:var(--text-muted);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s}
  .jump-btn:hover{background:var(--hover-bg);border-color:var(--hover-bd);color:var(--hover-fg)}

  .cn-graphic{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1.5rem;box-shadow:0 1px 2px rgba(30,42,68,.05)}
  .cn-graphic-title{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:.25rem}
  .cn-graphic-sub{font-size:12px;color:var(--text-faint);margin-bottom:1rem}
  .cn-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:1.1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
  .cn-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted)}
  .cn-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .cn-dot.sensory{background:#7B4FA0}
  .cn-dot.motor{background:#2C8C8C}
  .cn-dot.mixed{background:#C0524F}
  .cn-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .cn-card{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;background:var(--surface2);border:1px solid var(--border)}
  .cn-num{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;color:#fff}
  .cn-num.sensory{background:#7B4FA0}
  .cn-num.motor{background:#2C8C8C}
  .cn-num.mixed{background:#C0524F}
  .cn-info{min-width:0}
  .cn-name{font-size:12.5px;font-weight:600;color:var(--navy);line-height:1.3}
  .cn-func{font-size:11px;color:var(--text-muted);line-height:1.3}
  @media(max-width:500px){.cn-grid{grid-template-columns:1fr}}

  @media(max-width:500px){
    .site-header{padding:1.5rem 1rem 1.25rem}
    .ch-header{padding:1rem}
    .q-card{padding:1rem}
    .score-bar{gap:.625rem}
    .tab-btn{font-size:11px;padding:.8rem .9rem}
  }
</style>

[{"title": "Structure and Function of the Neurologic System", "code": "Chapter 14", "subtitle": "CNS/PNS Anatomy, Neurons, Brain, Spinal Cord & Autonomic Function", "general": [{"q": "Which division of the nervous system is responsible for carrying sensory information toward the central nervous system?", "opts": ["Efferent (descending) pathway", "Afferent (ascending) pathway", "Somatic motor pathway", "Sympathetic pathway"], "ans": 1, "exp": "Afferent (ascending) pathways carry sensory information from the periphery toward the CNS. A helpful mnemonic: Afferent = Arrives (sensory in); Efferent = Exits (motor out)."}, {"q": "Which neurons transmit impulses from neuron to neuron rather than to or from the CNS?", "opts": ["Motor neurons", "Sensory neurons", "Interneurons (associational neurons)", "Unipolar neurons"], "ans": 2, "exp": "Interneurons (associational neurons) transmit impulses neuron-to-neuron, often within the CNS. Motor neurons carry impulses away from the CNS to effectors, and sensory neurons carry impulses from peripheral receptors toward the CNS."}, {"q": "What structural feature of the axon has the lowest threshold for triggering an action potential?", "opts": ["Axon hillock", "Initial segment", "Synaptic knob", "Node of Ranvier"], "ans": 1, "exp": "The initial segment of the axon (just past the axon hillock) has the lowest threshold for stimulation, making it the site where action potentials are typically generated before propagating down the axon."}, {"q": "Saltatory conduction, in which ion flow jumps from node to node rather than traveling continuously along the membrane, depends on which structure?", "opts": ["Dendrites", "Myelin sheath with Nodes of Ranvier", "Synaptic cleft", "Axon hillock"], "ans": 1, "exp": "The myelin sheath insulates segments of the axon, while the Nodes of Ranvier interrupt it at intervals. This allows the nerve impulse to 'jump' from node to node (saltatory conduction), greatly increasing conduction speed compared to unmyelinated fibers."}, {"q": "Neuroglial cells make up approximately what proportion of total brain and spinal cord volume?", "opts": ["About 10%", "About 25%", "About half", "Nearly all of it, with very few neurons"], "ans": 2, "exp": "Neuroglia (\"nerve glue\") make up about half of the total volume of the brain and spinal cord. They provide structural support, protection, and nutrition for neurons and assist neurotransmission, but they are not themselves electrically excitable in the way neurons are."}, {"q": "Which neuroglial cell types are found in the central nervous system?", "opts": ["Schwann cells and satellite glial cells", "Astrocytes, oligodendroglia, ependymal cells, and microglia", "Only Schwann cells", "Only astrocytes"], "ans": 1, "exp": "CNS neuroglia include astrocytes, oligodendroglia, ependymal cells, and microglia. Schwann cells, nonmyelinating Schwann cells, and satellite glial cells are instead found in the peripheral nervous system."}, {"q": "Following injury to a peripheral nerve fiber, degeneration of the segment distal to the injury site is known as which process?", "opts": ["Saltatory conduction", "Wallerian degeneration", "Synaptic pruning", "Demyelination"], "ans": 1, "exp": "Wallerian degeneration is the degeneration of the nerve fiber distal to an injury, involving swelling, myelin sheath disintegration, and axon breakdown (\"if you don't use it, you lose it\"). The proximal segment instead shows changes that support potential regeneration, which is generally limited to myelinated axons in the PNS."}, {"q": "Which statement best describes the brain's reticular activating system?", "opts": ["It is found only in the spinal cord and controls reflexes", "It combines the reticular formation with the cerebral cortex and is necessary for arousal and life-sustaining function", "It is a structure exclusive to the cerebellum that governs balance", "It has no role in cardiovascular or respiratory control"], "ans": 1, "exp": "The reticular formation is a network of brainstem nuclei that regulates vital reflexes such as cardiovascular and respiratory function. Combined with the cerebral cortex, it forms the reticular activating system (RAS), which is essential for arousal, wakefulness, and level of consciousness."}, {"q": "Which brain region houses the thalamus, hypothalamus, epithalamus, and subthalamus?", "opts": ["Telencephalon", "Diencephalon", "Metencephalon", "Myelencephalon"], "ans": 1, "exp": "The diencephalon, part of the forebrain, contains the epithalamus, thalamus, hypothalamus, and subthalamus. The telencephalon (also forebrain) contains the cerebral cortex and basal ganglia; the metencephalon (hindbrain) contains the cerebellum and pons; the myelencephalon (hindbrain) contains the medulla oblongata."}, {"q": "Approximately what percentage of cardiac output does the brain normally receive?", "opts": ["5%", "10%", "20%", "40%"], "ans": 2, "exp": "The brain receives about 20% of cardiac output (roughly 800-1000 mL/min), despite making up only a small fraction of total body weight. Cerebral blood flow is tightly autoregulated, with carbon dioxide serving as the primary chemical regulator."}, {"q": "Which substance is the primary chemical regulator of cerebral blood flow?", "opts": ["Oxygen", "Carbon dioxide", "Glucose", "Sodium"], "ans": 1, "exp": "Carbon dioxide is the most powerful regulator of cerebral blood flow. Increased CO2 (hypercapnia) causes cerebral vasodilation and increased flow, while decreased CO2 (hypocapnia) causes vasoconstriction—clinically relevant when hyperventilation is used to acutely lower intracranial pressure."}, {"q": "The blood-brain barrier restricts the entry of substances into brain tissue primarily through which structural feature?", "opts": ["Fenestrated capillaries", "Endothelial tight junctions supported by astrocytes, pericytes, and microglia", "Thick venous walls", "Open synaptic clefts"], "ans": 1, "exp": "The blood-brain barrier is formed by tight junctions between cerebral capillary endothelial cells, with structural and functional support from astrocytes, pericytes, and microglia. Lipophilic substances (including many drugs) cross more readily than hydrophilic or ionized substances, which has important implications for drug therapy."}, {"q": "Cerebrospinal fluid is produced by which structure and reabsorbed by which structure?", "opts": ["Produced by arachnoid villi, reabsorbed by choroid plexus", "Produced by choroid plexus, reabsorbed by arachnoid villi", "Produced and reabsorbed entirely within the dura mater", "Produced by the pia mater, reabsorbed by the cerebellum"], "ans": 1, "exp": "CSF (approximately 125-150 mL) is produced by the choroid plexuses located in the lateral, third, and fourth ventricles, and is reabsorbed into venous circulation via the arachnoid villi."}, {"q": "Which two coverings define the boundaries of the subarachnoid space, where CSF circulates around the brain and spinal cord?", "opts": ["Dura mater and arachnoid mater", "Arachnoid mater and pia mater", "Pia mater and brain tissue", "Skull and dura mater"], "ans": 1, "exp": "The subarachnoid space lies between the arachnoid mater and the pia mater, and is where cerebrospinal fluid circulates around the brain and spinal cord. The subdural space, by contrast, lies between the dura mater and the arachnoid mater."}, {"q": "Which neurotransmitter is released by all parasympathetic fibers (both preganglionic and postganglionic) and by sympathetic preganglionic fibers?", "opts": ["Norepinephrine", "Dopamine", "Acetylcholine", "Serotonin"], "ans": 2, "exp": "Acetylcholine (cholinergic transmission) is released by sympathetic preganglionic fibers and by both preganglionic and postganglionic parasympathetic fibers. Norepinephrine (adrenergic transmission), by contrast, is released specifically by sympathetic postganglionic fibers."}, {"q": "The sympathetic nervous system's preganglionic fibers originate from which spinal levels, reflecting its description as the \"thoracolumbar division\"?", "opts": ["Cervical and sacral levels", "T1 through L2", "Only the cranial nerve nuclei", "The entire length of the spinal cord equally"], "ans": 1, "exp": "The sympathetic nervous system is called the thoracolumbar division because its preganglionic fibers originate from spinal levels T1 through L2. The parasympathetic nervous system, by contrast, is the craniosacral division, with outflow from cranial nerve nuclei and the sacral spinal cord."}, {"q": "Upper motor neurons are best described by which statement?", "opts": ["Cell bodies lie in spinal cord gray matter with axons extending into the PNS", "They lie entirely within the CNS and modify spinal reflex arcs while controlling fine motor movement", "They directly innervate skeletal muscle at the neuromuscular junction", "They are exclusively sensory in function"], "ans": 1, "exp": "Upper motor neurons lie entirely within the CNS; they control fine motor movement and modify spinal reflex arcs by synapsing with interneurons. Lower motor neurons, by contrast, have cell bodies in the spinal cord gray matter with axons that extend into the PNS to directly influence muscle."}, {"q": "Which structures together make up a basic reflex arc?", "opts": ["Receptor, afferent neuron, efferent neuron, effector", "Dendrite, axon, synapse, neurotransmitter", "Cerebrum, brainstem, cerebellum, spinal cord", "Sympathetic ganglion, postganglionic neuron, target organ"], "ans": 0, "exp": "A reflex arc is the basic functional unit that responds to a stimulus, requiring a receptor (detects the stimulus), an afferent (sensory) neuron (carries the signal to the CNS), an efferent neuron (carries the response away), and an effector (muscle or gland that carries out the response)."}, {"q": "Which finding is expected with normal age-related changes in the nervous system?", "opts": ["Increased number of neurons and brain weight", "Decreased number of neurons, decreased brain weight, and accumulation of lipofuscin and neurofibrillary tangles", "Faster neurologic response times", "Complete absence of any structural change"], "ans": 1, "exp": "Normal aging of the nervous system is associated with a decreased number of neurons, decreased brain weight and size, accumulation of lipofuscin and neurofibrillary tangles, and slowed neurologic response times—distinct from the more pronounced and progressive changes seen in neurodegenerative disease."}], "clinical": [{"q": "A patient develops difficulty breathing after a spinal cord injury. The nurse recalls that the brain region most responsible for cardiovascular and basic life-sustaining control is the:", "opts": ["Cerebrum", "Brain stem", "Diencephalon", "Cerebellum"], "ans": 1, "exp": "The brain stem houses the reticular formation and vital centers responsible for cardiovascular and respiratory control. This is why brain stem injury is so often life-threatening, while damage to the cerebrum or cerebellum, though serious, does not directly threaten these basic vital functions in the same way."}, {"q": "A provider orders a test to examine a patient's cerebrospinal fluid for suspected meningitis. Which procedure should the nurse anticipate?", "opts": ["MRI", "Cerebral biopsy", "Thoracic puncture", "Lumbar puncture"], "ans": 3, "exp": "A lumbar puncture, typically performed at the L3-L4 interspace (below the spinal cord itself, in the subarachnoid space), allows CSF to be withdrawn and analyzed for infection, blood, or other abnormalities. MRI does not directly sample CSF, and \"thoracic puncture\" is not a standard procedure for this purpose."}, {"q": "A patient who suffered a stroke can no longer comprehend spoken language or express herself verbally. Which term best describes this deficit?", "opts": ["Agnosia", "Aphasia", "Dyslexia", "Agraphia"], "ans": 1, "exp": "Aphasia is the inability to comprehend or express language appropriately, and is usually associated with a cerebrovascular accident affecting the dominant (typically left) hemisphere. Agnosia is a defect of pattern recognition rather than language; dyslexia involves reading difficulty; agraphia involves impaired writing ability."}, {"q": "A patient with increased intracranial pressure is being assessed by the nurse. Which finding would NOT be expected as a result of this condition?", "opts": ["Constricted pupils", "Headache", "Vomiting", "Papilledema"], "ans": 0, "exp": "Increased intracranial pressure classically causes dilated, sluggish, or fixed pupils (from compression of cranial nerve III)—not constricted pupils. Headache, vomiting (from pressure on the medullary emetic center), and papilledema (from increased CSF pressure transmitted to the optic disc) are all expected findings."}, {"q": "A patient presents with sudden, severe lower back pain radiating down one leg after lifting a heavy object. Imaging confirms a herniated intervertebral disk. Which region is most commonly involved?", "opts": ["Thoracic region", "Lumbosacral region", "Cervical region", "Intercostal region"], "ans": 1, "exp": "The lumbosacral region (commonly L4-S1) bears the greatest mechanical load and stress during bending, twisting, and lifting, making it the most common site for intervertebral disk herniation."}, {"q": "A patient is newly diagnosed with epilepsy. The nurse explains that seizures are broadly divided into which two types?", "opts": ["Generalized and partial (focal)", "Acute and chronic", "Congenital and induced", "Local and systemic"], "ans": 0, "exp": "Seizures are broadly classified as generalized (involving both hemispheres, typically with loss of consciousness) or focal/partial (originating from a localized area of the brain, which may or may not impair consciousness)."}, {"q": "A child experiences brief episodes of staring and unresponsiveness, while another patient experiences major motor convulsions with rigidity followed by jerking. These are respectively known by what older terminology?", "opts": ["Petit mal and grand mal", "Tonic and contractile", "Simple and complex", "Grand mal and prodromal"], "ans": 0, "exp": "Absence seizures (brief staring spells) and tonic-clonic seizures (rigidity followed by jerking movements) were historically termed petit mal and grand mal seizures, respectively."}, {"q": "A patient presents with a bull's-eye rash, joint pain, and new-onset facial nerve palsy after a recent tick bite. Encephalitis from this organism is caused by which pathogen?", "opts": ["An arbovirus", "Rickettsia", "Herpes simplex virus", "Borrelia burgdorferi (Lyme disease)"], "ans": 3, "exp": "Borrelia burgdorferi, transmitted by tick bite, causes Lyme disease, which can produce a form of encephalitis along with its more classic findings (erythema migrans rash, arthralgia, and cranial nerve palsies such as facial palsy)."}, {"q": "A child is diagnosed with cerebral palsy. The provider classifies the case by motor disability type. Which three categories make up this classification?", "opts": ["Intermittent, dyslexic, and spastic", "Acute, chronic, and dyskinetic disease", "Motor ataxic, chronic dysfunctional, and intermittent", "Spastic paralysis, ataxic, and dyskinetic disease"], "ans": 3, "exp": "Cerebral palsy is classified by motor disability into spastic (pyramidal, with increased tone), ataxic (cerebellar, with gait/balance instability), and dyskinetic (basal ganglia, with involuntary movements) types, plus a mixed variety combining features of more than one."}, {"q": "A family asks the nurse about treatment options for their parent's newly diagnosed Alzheimer disease. What is the most accurate response regarding a cure?", "opts": ["Psychotherapy can reverse the disease", "Psychostimulants will cure the underlying condition", "There is no current cure", "Antidepressants are curative"], "ans": 2, "exp": "There is currently no cure for Alzheimer disease. Available treatments may help manage symptoms or modestly slow progression, but they do not reverse the underlying neurodegeneration (cortical atrophy with plaques and neurofibrillary tangles)."}, {"q": "A patient sustains a head injury with bruising of brain tissue and rupture of small blood vessels with resulting edema, but the skull and dura remain intact. What is this injury called?", "opts": ["Compound fracture", "Concussion", "Closed head injury", "Contusion"], "ans": 3, "exp": "A contusion is bruising of brain tissue with rupture of small blood vessels and associated edema. A concussion, by contrast, is a transient functional disturbance without structural bruising; a compound fracture involves a break in the skin/skull continuity."}, {"q": "A patient with rapidly progressive dementia, myoclonus, and a characteristic EEG pattern is suspected of having Creutzfeldt-Jakob disease. This condition is caused by which type of pathogen?", "opts": ["A single-stranded RNA virus", "A prion", "A spore-forming bacterium", "A parasitic protozoan"], "ans": 1, "exp": "Creutzfeldt-Jakob disease is a rapidly progressive, fatal neurodegenerative disorder caused by a prion—an abnormally folded, infectious protein that induces misfolding of normal proteins, leading to characteristic spongiform changes in brain tissue."}, {"q": "A patient with schizophrenia is being evaluated. Which framework is used to classify the patient's symptoms?", "opts": ["Acute or chronic", "Temporary or permanent", "Positive or negative", "Systemic or local"], "ans": 2, "exp": "Symptoms of schizophrenia are classified as positive (added abnormal experiences, such as hallucinations and delusions) or negative (loss of normal function, such as flat affect and social withdrawal)."}, {"q": "A young adult presents with progressive chorea (involuntary jerking movements), personality changes, and a strong family history of a similar illness. Which inherited disorder is most consistent with this presentation?", "opts": ["Myasthenia gravis", "Amyotrophic lateral sclerosis", "Vascular dementia", "Huntington disease"], "ans": 3, "exp": "Huntington disease is an inherited (autosomal dominant) disorder involving progressive degeneration of neurons in specific areas of the brain (notably the basal ganglia), producing chorea, personality changes, and progressive cognitive decline."}, {"q": "A patient with a spinal cord injury at the cervical level develops a sudden, severe headache with markedly elevated blood pressure after his urinary catheter becomes kinked. The nurse recognizes this as:", "opts": ["A lumbar spine complication", "A sacrum injury response", "Autonomic dysreflexia from his cervical spine injury", "A normal response unrelated to his injury level"], "ans": 2, "exp": "Autonomic dysreflexia (autonomic hyperreflexia) most often occurs with spinal cord injuries at or above T6, including cervical injuries, typically once spinal shock has resolved. A noxious stimulus below the injury level (such as a distended bladder from a kinked catheter) triggers an unchecked sympathetic response, causing severe hypertension and headache—a medical emergency requiring prompt removal of the triggering stimulus."}, {"q": "A patient with Parkinson disease asks how the condition affects movement. The nurse should explain that motor symptoms result from:", "opts": ["Loss of extrapyramidal activity due to dopamine deficiency", "Lack of oxygen to the cerebral hemispheres", "Necrosis of tissue in the brain stem", "Alteration of metabolism of cortical neurons"], "ans": 0, "exp": "Parkinson disease results from degeneration of dopamine-producing neurons in the basal ganglia (substantia nigra), causing a loss of normal extrapyramidal motor activity and producing the classic triad of resting tremor, rigidity, and bradykinesia."}, {"q": "A 28-year-old woman presents with new visual disturbances, limb weakness, and sensory changes. Given typical onset, which diagnosis should the nurse consider?", "opts": ["Onset is typical for ages 10-25", "Onset is typical for ages 50-70", "Onset is typical for ages 60-80", "Onset is typical for ages 20-40, consistent with multiple sclerosis"], "ans": 3, "exp": "Multiple sclerosis symptoms most commonly have their onset between ages 20 and 40, making this patient's age and presentation (visual disturbance, weakness, sensory change) consistent with a possible new MS diagnosis."}, {"q": "A patient reports fluctuating muscle weakness that worsens with activity and improves with rest, particularly affecting the eyelids and facial muscles. Which chronic autoimmune disorder is most consistent with this presentation?", "opts": ["Huntington disease", "Vascular dementia", "Amyotrophic lateral sclerosis", "Myasthenia gravis"], "ans": 3, "exp": "Myasthenia gravis is a chronic autoimmune disorder in which antibodies impair acetylcholine receptors at the neuromuscular junction, producing fluctuating muscle weakness and fatigue that characteristically worsens with activity and improves with rest, often first noticed in the eyelids and face."}, {"q": "A prenatal ultrasound reveals herniation of the spinal cord, nerves, and meninges through a vertebral defect. Which condition does this describe?", "opts": ["Myelomeningocele", "Spina bifida occulta", "Meningocele", "Hydrocephalus"], "ans": 0, "exp": "Myelomeningocele is the most severe form of spina bifida, involving herniation of the spinal cord, nerve roots, and meninges through a vertebral defect, and is typically associated with significant neurologic deficits because neural tissue itself is involved."}, {"q": "A child is diagnosed with the most common congenital myopathy causing muscle weakness in children. Which condition is this?", "opts": ["Muscular dystrophy", "Spina bifida occulta", "Myasthenia gravis", "Cerebral palsy"], "ans": 3, "exp": "Cerebral palsy, resulting from nonprogressive brain damage occurring during fetal or neonatal development, is the most common congenital cause of motor disability/muscle weakness in children."}, {"q": "A patient with rapidly progressive weakness involving both upper and lower motor neuron signs is diagnosed with Lou Gehrig disease. What is the formal name for this condition?", "opts": ["Huntington disease", "Amyotrophic lateral sclerosis", "Vascular dementia", "Myasthenia gravis"], "ans": 1, "exp": "Amyotrophic lateral sclerosis (ALS), also known as Lou Gehrig disease, is a progressive degenerative disease involving both upper and lower motor neurons, typically fatal from respiratory failure within a few years of diagnosis."}, {"q": "A patient is comatose but has intact reflexes and respiration. The nurse understands that the system responsible for maintaining the level of consciousness is the:", "opts": ["Spinal cord", "Reticular activating system", "Cerebellum", "Limbic system"], "ans": 1, "exp": "The reticular activating system (RAS), formed by the reticular formation in combination with the cerebral cortex, is responsible for arousal and maintaining the level of consciousness. Damage or dysfunction here can profoundly impair consciousness."}, {"q": "An infant presents with an enlarged head, bulging fontanels, and downward-deviated eyes. Imaging reveals an abnormal buildup of CSF within the ventricles. What is this condition called?", "opts": ["Heavy hemorrhage in the meninges", "Lack of CSF surrounding the brain", "Extremely low blood pressure", "Hydrocephalus, from abnormal accumulation of CSF in the ventricular system"], "ans": 3, "exp": "Hydrocephalus is caused by an abnormal accumulation of CSF within the ventricular system, resulting from increased production, obstructed flow, or impaired reabsorption, leading to ventricular enlargement and increased intracranial pressure."}, {"q": "A patient has a lesion located in the brain stem. How would this lesion be classified relative to the tentorium cerebelli?", "opts": ["Supratentorial", "Diencephalic", "Cortical", "Infratentorial"], "ans": 3, "exp": "An infratentorial lesion is located below the tentorium cerebelli, in structures such as the brain stem or cerebellum. Supratentorial lesions, by contrast, are located above the tentorium, involving the cerebral hemispheres or diencephalon."}, {"q": "A patient develops a brain abscess following a dental infection. Which organism is LEAST likely to be implicated as a common cause?", "opts": ["Pseudomonas", "Pneumococci", "Staphylococci", "Streptococci"], "ans": 0, "exp": "Brain abscesses are commonly caused by streptococci, staphylococci, and pneumococci, often spreading from a contiguous infection (such as sinusitis, otitis, or dental infection) or hematogenously. Pseudomonas is not a typical causative organism for brain abscess."}, {"q": "A patient with cerebral edema from a brain tumor is started on medication to reduce swelling. Which class of drug is most appropriate?", "opts": ["Epinephrine", "Glucocorticoids", "Plasmin", "Aspirin"], "ans": 1, "exp": "Glucocorticoids (such as dexamethasone) are commonly used to reduce vasogenic cerebral edema, particularly that associated with brain tumors, by decreasing capillary permeability."}, {"q": "A 58-year-old patient is diagnosed with the most common type of primary malignant brain tumor. Which tumor type is this?", "opts": ["Adenoma", "Astrocytoma", "Meningioma", "Lymphoma"], "ans": 1, "exp": "Astrocytomas (a type of glioma) are the most common primary malignant brain tumors in adults, ranging from low-grade to the highly aggressive glioblastoma multiforme."}, {"q": "A patient presents with paralysis of the right arm following a stroke. The nurse anticipates that imaging will reveal damage to which area?", "opts": ["Left occipital lobe", "Right temporal lobe", "Right parietal lobe", "Left frontal lobe"], "ans": 3, "exp": "Because motor pathways from the frontal lobe (primary motor cortex) cross to the opposite side of the body, damage to the left frontal lobe produces paralysis (or weakness) of the right arm and other right-sided structures."}, {"q": "A patient sustains a closed head injury from shearing forces during a motor vehicle accident. The resulting hematoma forms within the brain parenchyma itself. Which type of hematoma is this?", "opts": ["Epidural hematoma", "Subarachnoid hematoma", "Subdural hematoma", "Intracerebral hematoma"], "ans": 3, "exp": "Intracerebral hematomas generally result from contusions or shearing injuries within the brain tissue itself, distinguishing them from epidural (between dura and skull), subdural (between dura and arachnoid), and subarachnoid (between arachnoid and pia) hematomas, which occur in the meningeal spaces."}, {"q": "Following a basilar skull fracture, a patient is noted to have blood draining from the ear. What is this finding called?", "opts": ["Meniere's syndrome", "Otorrhagia", "Concussion", "Contusion"], "ans": 1, "exp": "Otorrhagia refers to blood leaking from the ear as a result of head injury, often associated with a basilar skull fracture. This differs from otorrhea, which specifically refers to CSF (not blood) leaking from the ear."}, {"q": "Through what space does cerebrospinal fluid circulate around the brain and spinal cord?", "opts": ["Between the double layers of the dura mater", "In the subdural space", "In the subarachnoid space", "Through the arachnoid villi only"], "ans": 2, "exp": "CSF circulates within the subarachnoid space, located between the arachnoid mater and the pia mater. The arachnoid villi are the site of CSF reabsorption into venous blood, not the space through which it circulates."}, {"q": "A patient has a stroke affecting the left hemisphere. Which functional area is most likely impacted, given that this is the usual hemisphere for this function?", "opts": ["Language centers", "Spatial awareness exclusively", "Artistic ability exclusively", "Equilibrium control"], "ans": 0, "exp": "In most individuals, the language centers (including Broca's and Wernicke's areas) are located in the left hemisphere, which is why left-hemisphere strokes so commonly produce aphasia."}, {"q": "A patient sustains damage to the auditory association area in the left hemisphere. What deficit should the nurse expect?", "opts": ["Loss of hearing in both ears", "Inability to understand what is heard", "Loss of hearing in the left ear only", "Inability to determine the source of a sound"], "ans": 1, "exp": "Damage to the auditory association area (involved in processing and interpreting sound, including Wernicke's area for language) impairs the ability to understand what is heard, even though basic hearing (detected via the primary auditory cortex) may remain intact."}, {"q": "A nurse is reviewing the descending motor pathway most responsible for voluntary, skilled movement. Which statement applies to the corticospinal tract?", "opts": ["It is an ascending tract", "The nerve fibers conduct sensory impulses", "It is an extrapyramidal tract", "It is a pyramidal tract carrying efferent (motor) impulses"], "ans": 3, "exp": "The corticospinal tract is a pyramidal tract that carries efferent (motor) impulses from the motor cortex down to the spinal cord, controlling voluntary skeletal muscle movement. It is descending, not ascending, and it is pyramidal, not extrapyramidal."}, {"q": "A family member asks what role the limbic system plays in the brain. What is the nurse's best answer?", "opts": ["It controls overall fluid balance", "It is required for logical thinking and decision-making", "It determines emotional responses and is involved in long-term memory", "It is responsible for artistic and musical talent"], "ans": 2, "exp": "The limbic system mediates emotional responses, motivation, mood, feeding behaviors, biologic rhythms, and the sense of smell, and contributes to long-term memory through connections with the prefrontal cortex. It is not primarily responsible for logical reasoning or fluid balance regulation."}, {"q": "A patient is described as having continued brainstem function with loss of awareness and intellectual function. Which term applies?", "opts": ["Depression of the RAS with inability to initiate action", "A vegetative state", "Continuing intellectual function with inability to communicate", "Disorientation with decreased responsiveness"], "ans": 1, "exp": "A vegetative state refers to loss of awareness and intellectual (cortical) function while brainstem function continues, allowing for spontaneous breathing and basic reflexes despite the absence of conscious awareness."}, {"q": "A care team is evaluating a patient for brain death. Which of the following findings would argue AGAINST that diagnosis?", "opts": ["No activity on EEG", "Absence of all reflexes", "No spontaneous respirations", "Presence of any head injury"], "ans": 3, "exp": "Presence of a head injury alone is not a criterion for brain death—it is simply part of the clinical history. The accepted criteria include a flat EEG, absence of all reflexes, and no spontaneous respirations, generally confirmed after a completed diagnostic and therapeutic workup."}, {"q": "A patient develops decreasing responsiveness following a head injury. The nurse understands that this is significant because it represents:", "opts": ["A late and unreliable sign of brain injury", "An early indicator of increased intracranial pressure", "A normal finding with no clinical significance", "A sign of psychogenic unresponsiveness"], "ans": 1, "exp": "Decreasing responsiveness (a decline in level of consciousness) is considered one of the earliest and most sensitive indicators of increased intracranial pressure, often preceding more dramatic findings such as pupillary changes or vital sign abnormalities."}, {"q": "A patient with increased intracranial pressure begins vomiting without preceding nausea. What is the physiologic rationale for this finding?", "opts": ["Chemoreceptors responding to changes in the blood", "Pressure extending to spinal nerves", "Pressure on the emetic center in the medulla", "Stimuli to the hypothalamic hunger center"], "ans": 2, "exp": "Increased intracranial pressure can directly stimulate the emetic (vomiting) center located in the medulla, producing vomiting that is often abrupt and not preceded by typical nausea, distinguishing it from vomiting due to gastrointestinal causes."}, {"q": "A patient with rising intracranial pressure shows a widening gap between systolic and diastolic blood pressure readings. What does the nurse recognize this as?", "opts": ["Erratic diastolic pressure", "Decreasing systolic pressure", "Proportionate decrease in both pressures", "Increasing pulse pressure"], "ans": 3, "exp": "As intracranial pressure rises, systolic blood pressure tends to rise more than diastolic pressure, producing a widening (increasing) pulse pressure—part of the classic Cushing triad (along with bradycardia and irregular respirations) seen in advanced increased ICP."}, {"q": "A patient with papilledema is being evaluated for increased intracranial pressure. What causes papilledema in this context?", "opts": ["Increased pressure of CSF transmitted to the optic disc", "Increased intraocular pressure from glaucoma", "Direct pressure on the oculomotor nerve", "Pressure on the optic chiasm"], "ans": 0, "exp": "Papilledema results from increased CSF pressure transmitted along the optic nerve sheath to the optic disc, causing swelling that is visible on fundoscopic examination—an important sign of increased intracranial pressure."}, {"q": "A patient with an enlarging brain abscess develops slower heart rate and systemic vasoconstriction. What does this reflect about cardiovascular response to rising ICP?", "opts": ["Increased heart rate with systemic vasodilation", "Low blood pressure with irregular heart and respiratory rates", "Systemic vasoconstriction with slower heart rate (an early compensatory response)", "Immediate depression of the cardiac control centers"], "ans": 2, "exp": "As intracranial pressure rises, an early compensatory cardiovascular response includes systemic vasoconstriction (to maintain cerebral perfusion pressure) together with a slowing heart rate—part of the body's attempt to preserve adequate blood flow to the compressed brain tissue."}, {"q": "A patient's pupil on the side of a brain lesion becomes dilated and unresponsive to light as intracranial pressure rises. What is the mechanism for this finding?", "opts": ["Direct pressure on the optic nerve", "Pressure on parasympathetic fibers of cranial nerve III", "Pressure on sympathetic nerve fibers to the eye", "Pressure on the occipital lobe"], "ans": 1, "exp": "As ICP rises and brain tissue shifts, pressure on cranial nerve III (oculomotor nerve)—specifically its parasympathetic fibers controlling pupillary constriction—causes the ipsilateral pupil to become dilated ('blown') and unresponsive to light, a critical and urgent neurologic warning sign."}, {"q": "A patient with a brain tumor experiences a new-onset focal seizure. What is the physiologic explanation for why brain tumors can trigger seizures?", "opts": ["Surrounding inflammation stimulates neurons to discharge spontaneously", "Malignant tumors cause alkalosis that excites the CNS", "Systemic effects of the tumor cause seizures unrelated to the brain itself", "Metabolic effects of cancer change blood chemistry to trigger seizures"], "ans": 0, "exp": "Brain tumors often cause local inflammation and irritation of surrounding brain tissue. This inflammation can stimulate nearby neurons to fire abnormally and spontaneously, which is why seizures can be an early warning sign of an underlying brain tumor."}, {"q": "A patient experiences transient right-hand weakness lasting 20 minutes that completely resolves with no evidence of infarction on imaging. Which statement about this event is TRUE?", "opts": ["It usually causes necrosis and permanent brain damage", "It may be caused by rupture of an aneurysm or damaged artery", "It usually indicates systemic hypertension as the sole cause", "It can warn of a potential future cerebrovascular accident"], "ans": 3, "exp": "This presentation describes a transient ischemic attack (TIA)—a brief episode of focal neurologic dysfunction from temporary ischemia that resolves completely without permanent infarction. TIAs are an important warning sign for an increased risk of future stroke."}, {"q": "A patient with an acute ischemic stroke is found to have a cardiac source of embolism. What is the most likely original source of an embolus causing this type of cerebrovascular accident?", "opts": ["Right ventricle of the heart", "Femoral vein", "Common carotid artery", "Pulmonary artery"], "ans": 2, "exp": "Emboli causing cerebrovascular accidents most commonly arise from the common carotid artery (often from atherosclerotic plaque) or from the heart itself (e.g., in atrial fibrillation), rather than from the venous system, which would instead risk pulmonary embolism."}, {"q": "A patient with chronic atherosclerosis experiences a stroke, but neurologic deficits are less severe than expected for the size of the occlusion. What likely explains this?", "opts": ["Rupture of a cerebral artery", "An embolus blocking a major vessel", "Presence of collateral circulation, most likely with gradual atherosclerosis", "Vasospasm in the cerebral circulation"], "ans": 2, "exp": "Collateral circulation (alternate vascular pathways, such as through the Circle of Willis) is most likely to develop and be protective when a CVA results from gradual atherosclerosis, since the slow narrowing allows time for collateral vessels to compensate, often reducing the severity of resulting deficits compared to an acute embolic occlusion."}, {"q": "A patient's stroke symptoms continue to worsen over the first several days following onset. Which statement about CVA is TRUE in this context?", "opts": ["The common cause is an atheroma with thrombus", "Maximum necrosis and infarction develop within several hours of onset", "Warning signs may appear with partial obstruction of the artery", "Increasing neurological deficits usually develop during the first few days"], "ans": 1, "exp": "This question asks which statement does NOT apply to CVA. Maximum necrosis and infarction do NOT develop within just a few hours; rather, the ischemic process and resulting tissue damage typically evolve over the first few days, which is why neurological deficits often increase during this period rather than peaking immediately."}, {"q": "A stroke patient's family asks what determines the severity of his symptoms. What is the nurse's best response?", "opts": ["Location of obstruction, size of artery involved, and area of brain affected", "Duration of the blockage, distance from the heart, and type of obstruction", "Health of the victim, area affected, and collateral circulation only", "Size of obstruction, condition of the heart, and duration of blockage only"], "ans": 0, "exp": "Signs and symptoms of a stroke depend on the location of the vascular obstruction, the size of the artery involved, and the specific area of the brain affected by the resulting ischemia—these factors together determine which functions are disrupted and to what degree."}, {"q": "A patient recovering from a stroke regains some neurologic function over the following weeks. Which factors could contribute to this recovery? (1) Collateral circulation, (2) immediate thrombolytic therapy, (3) reduced inflammation, (4) development of alternative neuronal pathways", "opts": ["1 only", "2 only", "1 and 3 only", "1, 2, 3, and 4"], "ans": 3, "exp": "Recovery of neurologic function after a CVA can result from multiple mechanisms: presence of collateral circulation, prompt therapy that dissolved thrombi and preserved perfusion, resolution of surrounding inflammation, and the brain's development of alternative neuronal pathways (neuroplasticity)—all of which may contribute."}, {"q": "A patient with bacterial meningitis undergoes imaging that shows inflammation and exudate. Where does this swelling and purulent exudate characteristically form?", "opts": ["In the pia mater, arachnoid, and over the surface of the entire brain", "In the dura mater and epidural space", "Only at the site of injury or microbial entry", "Primarily and exclusively around the spinal cord"], "ans": 0, "exp": "In bacterial meningitis, the pia mater and arachnoid mater become inflamed, and purulent exudate accumulates in the subarachnoid space, spreading over the surface of the entire brain (and spinal cord)—reflecting the diffuse nature of this infection within the meningeal coverings."}, {"q": "A patient presents with severe headache, neck stiffness, and sensitivity to light. Which set of findings is most significant for acute bacterial meningitis?", "opts": ["Severe headache, nuchal rigidity, and photophobia", "Fatigue, fever, and anorexia alone", "Focal signs such as progressive limb paralysis", "Ascending paralysis beginning in the legs"], "ans": 0, "exp": "The classic triad of severe headache, nuchal rigidity (neck stiffness), and photophobia reflects meningeal irritation and is highly significant for acute bacterial meningitis, prompting urgent evaluation and treatment."}, {"q": "A patient develops ascending weakness beginning in the legs and progressing upward following a recent gastrointestinal illness. The pathophysiology of this condition (Guillain-Barré syndrome) involves:", "opts": ["Damage and loss of function in spinal cord motor neurons", "Encephalopathy with disorientation, headache, and coma", "Infection and inflammation of the motor cortex", "Inflammation and demyelination of peripheral nerves, causing ascending paralysis"], "ans": 3, "exp": "Guillain-Barré syndrome involves inflammation and demyelination of peripheral nerves, typically following an infection, leading to ascending paralysis that classically begins in the legs and progresses upward (mnemonic: \"G - Ground, B - Brain,\" ascending from the ground/feet toward the brain)."}, {"q": "A CT scan shows a section of skull bone pushed inward, compressing the brain. How does this depressed skull fracture cause brain damage?", "opts": ["A bone fragment penetrates and tears brain tissue", "A section of skull is missing, leaving the brain unprotected", "A section of skull bone is displaced below the level of the skull, causing pressure on the brain", "Many fracture lines are present, causing instability"], "ans": 2, "exp": "A depressed skull fracture occurs when a section of skull bone is pushed below the normal level of the skull surface, directly compressing underlying brain tissue and potentially causing localized injury."}, {"q": "Following a moderate head injury, a patient's condition worsens over the next several hours due to a hematoma. What is generally considered the most likely cause of this secondary brain damage?", "opts": ["Hematoma or infection", "Laceration by foreign objects", "Hypoxia or acidosis as the universal cause", "Tearing of blood vessels as the brain rotates inside the skull"], "ans": 0, "exp": "Following the initial (primary) head injury, hematoma formation or infection is the most likely cause of secondary brain damage, as expanding blood collections or infectious processes compress and further injure brain tissue over time."}, {"q": "A patient with a temporal bone fracture develops a rapidly expanding hematoma from the middle meningeal artery. Where is this hematoma located?", "opts": ["Between the dura mater and the arachnoid mater", "Between the dura mater and the skull", "Between the arachnoid mater and the pia mater", "Between the pia mater and the brain"], "ans": 1, "exp": "An epidural hematoma is located between the dura mater and the skull, classically resulting from arterial bleeding (often from the middle meningeal artery torn by a temporal bone fracture). Because it is arterial in origin, it can expand rapidly and is a true neurosurgical emergency."}, {"q": "A patient with a basilar skull fracture is noted to have clear fluid draining from the ear that tests positive for glucose. What does the term for this finding mean?", "opts": ["Bleeding from the nose", "CSF leaking from the ear", "Torn meninges without skull fracture", "Hemorrhage from the ear"], "ans": 1, "exp": "Otorrhea refers specifically to cerebrospinal fluid leaking from the ear, typically as a result of a basilar skull fracture that tears the meninges, creating a pathway for CSF to escape—an important sign because it also signals an increased risk of CNS infection."}, {"q": "A patient sustains multiple vertebral fractures in a car accident. Which classification system is used to describe these fractures?", "opts": ["Simple, compression, wedge, dislocation", "Compound, open, closed, shattered", "Complex, torsion, open, multiple", "Pressure, complex, simple, variable"], "ans": 0, "exp": "Vertebral fractures are classified as simple, compression, wedge, or dislocation type, based on the mechanism and resulting deformity of the vertebral structure."}, {"q": "A patient with a C5 spinal cord injury is in the period of spinal shock. Which finding should the nurse anticipate during this phase?", "opts": ["Spastic paralysis below the level of injury", "Urinary incontinence", "Possible periods of apnea", "Normal blood pressure"], "ans": 2, "exp": "Because the phrenic nerve (controlling the diaphragm) arises from C3-C5, a high cervical injury at C5 can impair diaphragmatic breathing, resulting in possible periods of apnea during spinal shock—a critical safety concern requiring close respiratory monitoring."}, {"q": "Weeks after an L2-L3 spinal cord injury, a patient develops stiff, involuntary leg contractions with increased reflexes. What does this indicate?", "opts": ["Recovery from spinal shock, with development of spastic paraplegia", "Persistent urinary retention as the primary finding", "Labile body temperature as the main concern", "Increased sensation in the legs"], "ans": 0, "exp": "Once spinal shock resolves following a lower spinal cord injury (such as L2-L3), spastic paraplegia—characterized by stiff, involuntary muscle contractions and increased reflexes in the legs—typically develops, signaling the return of reflex activity below the injury level (though not necessarily voluntary control)."}, {"q": "A patient with a cervical spinal cord injury develops a sudden, marked increase in blood pressure along with bradycardia after a period of normal function. What does the nurse recognize this as?", "opts": ["An unexpected drop in blood pressure and apnea", "A sudden marked increase in blood pressure with bradycardia", "Hyperreflexia limited to the arms and legs without other signs", "Urinary and bowel incontinence as the primary sign"], "ans": 1, "exp": "The hallmark presentation of autonomic dysreflexia in a patient with cervical spinal cord injury is a sudden, marked increase in blood pressure accompanied by bradycardia (a baroreceptor-mediated reflex response), along with severe headache—requiring immediate identification and removal of the triggering stimulus."}, {"q": "A stroke patient cannot form words, though comprehension of language remains relatively intact. Which area is most likely damaged?", "opts": ["The left frontal lobe (Broca area)", "The left temporal lobe", "The right motor cortex", "Wernicke's area"], "ans": 0, "exp": "Expressive aphasia (difficulty forming/producing words) most likely results from damage to the left frontal lobe, specifically Broca's area on the inferior frontal gyrus, which governs the motor aspects of speech production. This differs from receptive aphasia, which involves impaired comprehension and is linked to Wernicke's area in the temporal lobe."}, {"q": "A patient sustains an injury to the right occipital lobe. What visual deficit should the nurse expect?", "opts": ["Complete blindness in the left eye", "Loss of the left visual field in both eyes", "Complete blindness in the right eye", "Visual loss in the medial half of each eye"], "ans": 1, "exp": "Because visual pathways cross such that each occipital lobe processes the opposite (contralateral) visual field, damage to the right occipital lobe results in loss of the left visual field in both eyes (homonymous hemianopia), not blindness in one eye."}, {"q": "A patient's intracranial pressure is rising. What change in heart rate should the nurse anticipate as part of this process?", "opts": ["Heart rate decreases (bradycardia)", "Heart rate increases", "No change in heart rate occurs", "Heart rate becomes irregular but not slowed"], "ans": 0, "exp": "As intracranial pressure rises, heart rate typically decreases (bradycardia), reflecting a baroreceptor-mediated compensatory response as the body attempts to maintain cerebral perfusion pressure—part of the classic Cushing triad along with rising systolic blood pressure and irregular respirations."}, {"q": "A patient's brain CT shows downward displacement of brain tissue through the foramen magnum due to severely elevated ICP. Which statement best describes this herniation?", "opts": ["Movement of brain tissue into the ventricles", "Movement of the brain stem upward", "Pushing of excess CSF and blood down around the spinal cord", "Displacement of brain tissue downward toward the spinal cord"], "ans": 3, "exp": "Brain herniation from increased intracranial pressure involves displacement of brain tissue downward toward the spinal cord—most dangerously through the tentorial notch (uncal herniation) or the foramen magnum—which can compress the brainstem and rapidly lead to coma or death."}, {"q": "A patient develops a hemorrhagic stroke versus an ischemic stroke. Which type generally carries the poorest prognosis?", "opts": ["CVA caused by thrombus", "Hemorrhagic CVA", "Embolic CVA", "There is no difference among the types"], "ans": 1, "exp": "Hemorrhagic CVAs carry the poorest prognosis among stroke types, reflecting the combined effects of direct tissue destruction from the bleed itself and the additional mass effect and increased intracranial pressure caused by the accumulating blood."}, {"q": "A patient's risk factors for CVA are being reviewed. Which combination of the following predisposes an individual to a cerebrovascular accident? (1) Hypertension, (2) smoking cigarettes, (3) history of coronary artery disease, (4) diabetes mellitus", "opts": ["1 and 3 only", "1, 2, and 4 only", "2 and 4 only", "1, 2, 3, and 4"], "ans": 3, "exp": "Hypertension, smoking, history of coronary artery disease, and diabetes mellitus are all well-established risk factors that predispose an individual to a cerebrovascular accident, primarily through their effects on accelerating atherosclerosis and vascular injury."}, {"q": "A patient presents with a sudden, severe ('thunderclap') headache, neck stiffness, and light sensitivity. What are the significant early signs suggesting a ruptured cerebral aneurysm?", "opts": ["Impaired speech and muscle weakness", "Severe headache, nuchal rigidity, and photophobia", "Abnormal sensations and tremors", "Vomiting and visual abnormalities alone"], "ans": 1, "exp": "A ruptured cerebral aneurysm classically presents with a sudden, severe headache, nuchal rigidity, and photophobia—reflecting irritation of the meninges from blood released into the subarachnoid space."}, {"q": "A pediatric patient presents with meningitis. Which microbe-age group pairing is most accurate?", "opts": ["E. coli: elderly patients", "H. influenzae: neonates", "N. meningitidis: children and youth", "S. pneumoniae: young children exclusively"], "ans": 2, "exp": "Neisseria meningitidis is a common cause of bacterial meningitis specifically in children and youth (including outbreaks in school/dormitory settings), while other organisms (such as group B Streptococcus and E. coli) are more typically associated with neonatal meningitis."}, {"q": "A provider orders a lumbar puncture for a patient with suspected meningitis. Which statement applies to this procedure?", "opts": ["It is usually performed at L3-L4", "Fluid is withdrawn from the epidural space", "It can be used to confirm any diagnosis", "The tissue seals up immediately after puncture"], "ans": 0, "exp": "A lumbar puncture is usually performed at the L3-L4 interspace, below the termination of the spinal cord (conus medullaris) to avoid injuring neural tissue, allowing safe withdrawal of CSF from the subarachnoid space for diagnostic analysis."}, {"q": "A patient with a basilar skull fracture is at risk for a specific fracture type. Which type of fracture typically occurs at the base of the skull?", "opts": ["Depressed fracture", "Contrecoup fracture", "Comminuted fracture", "Basilar fracture"], "ans": 3, "exp": "A basilar fracture is, by definition, a fracture occurring at the base of the skull, often associated with CSF leakage (otorrhea or rhinorrhea) and increased risk of meningeal infection due to the potential communication created with the external environment."}, {"q": "A patient with a head injury develops a new seizure. What is the primary reason seizures frequently occur with head injuries?", "opts": ["The presence of blood irritates the neurons", "Otorrhea or rhinorrhea changes intracranial pressure", "The inflammatory response causes general hypoxia", "The CNS becomes globally depressed"], "ans": 0, "exp": "The presence of blood from a head injury irritates surrounding neurons, increasing their excitability and predisposing the brain to abnormal, spontaneous electrical discharge—explaining why seizures are a common early complication of traumatic brain injury."}, {"q": "A patient was in a high-speed collision and sustained a brain injury from the brain striking the inside of the skull due to rapid deceleration. What is this type of injury called?", "opts": ["Linear fracture", "Contusion", "Basilar injury", "Contrecoup injury"], "ans": 3, "exp": "A contrecoup injury occurs when the brain, due to sudden acceleration or deceleration, bounces off the inside of the skull, causing injury opposite the original point of impact—distinct from a coup injury, which occurs directly at the site of impact."}, {"q": "A patient presents with a painful, unilateral vesicular rash following a dermatomal pattern. Which condition does the nurse suspect?", "opts": ["Herpes zoster (shingles), with unilateral rash and pain along a dermatome", "Weakness and muscle atrophy in the legs from ALS", "Ascending paralysis from Guillain-Barré syndrome", "Skeletal muscle spasms of the face and neck"], "ans": 0, "exp": "Herpes zoster (shingles) is identified by its classic unilateral rash and pain distributed along a single dermatome (or along a cranial nerve), caused by reactivation of the dormant varicella-zoster virus residing in a sensory ganglion."}, {"q": "A patient with a localized neurologic infection shows focal neurologic deficits on exam. Which of the following conditions is most likely to present with focal signs?", "opts": ["Meningitis", "Brain abscess", "Encephalitis", "Intracerebral hemorrhage"], "ans": 1, "exp": "A brain abscess, being a localized, space-occupying lesion, is characteristically marked by focal neurologic signs corresponding to the specific area of brain it compresses, unlike the more diffuse processes of meningitis or encephalitis."}, {"q": "A patient reports a brief episode of weakness in one hand that resolved completely within 30 minutes. Which typical sign of a TIA does this represent?", "opts": ["Rapidly increasing intracranial pressure", "Loss of consciousness", "Transient muscle weakness in a hand or leg", "Headache, photophobia, and nuchal rigidity"], "ans": 2, "exp": "Typical signs of a transient ischemic attack include transient (temporary) muscle weakness in a hand or leg, along with other focal neurologic symptoms that resolve completely—distinguishing it from the more severe and lasting presentation of a full stroke."}, {"q": "An infant with hydrocephalus is found to have a blockage at the aqueduct of Sylvius. Why does excess CSF accumulate in this type of (noncommunicating) hydrocephalus?", "opts": ["Absorption of CSF through the arachnoid villi is impaired", "Excessive amounts of CSF are produced in the ventricles", "An obstruction is present in the aqueduct of Sylvius or other channel", "Flow around the spinal cord is blocked"], "ans": 2, "exp": "In noncommunicating (obstructive) hydrocephalus, an obstruction is present within the ventricular system itself—commonly at the narrow aqueduct of Sylvius—preventing CSF from flowing onward to be reabsorbed, leading to its accumulation and ventricular dilation proximal to the blockage."}, {"q": "An infant is assessed for hydrocephalus. Which of the following findings would NOT be a typical sign in the neonate?", "opts": ["Enlarged head with bulging fontanels", "Vomiting, headache, and paralysis", "Irritability and feeding difficulties", "Eyes turned downward with sclerae showing above the pupils"], "ans": 1, "exp": "This question asks which is NOT typical. Vomiting, headache, and paralysis are less specific/typical neonatal signs compared to the classic hydrocephalus triad of enlarged head with bulging fontanels, irritability with feeding difficulties, and the 'sunsetting' eye sign (downward gaze with sclerae visible above the pupils)."}, {"q": "A newborn is found to have herniation of the meninges, CSF, and spinal cord or nerves through a vertebral defect. What is the best description of this condition?", "opts": ["Asymptomatic failure of posterior spinous processes to fuse", "Herniation of the meninges only through a vertebral defect", "Herniation of the meninges, CSF, and spinal cord or nerves through a vertebral defect", "Herniation of brain tissue through a cranial defect"], "ans": 2, "exp": "A myelomeningocele is best described as herniation of the meninges, CSF, AND the spinal cord or nerve roots through a vertebral defect. This involvement of actual neural tissue (not just meninges) is what distinguishes it from a meningocele and accounts for its more severe neurologic consequences."}, {"q": "A pregnant patient undergoes prenatal screening that raises concern for spina bifida. How is this condition typically diagnosed prenatally?", "opts": ["Prenatally by ultrasound or detection of alpha-fetoprotein (AFP) in maternal blood or amniotic fluid", "Only after birth by direct observation of the sac", "After birth when the sac herniates as CSF builds up", "Only with a spinal X-ray after birth"], "ans": 0, "exp": "Spina bifida is typically diagnosed prenatally through ultrasound imaging and/or detection of elevated alpha-fetoprotein (AFP) levels in maternal blood or amniotic fluid, allowing for early identification and pregnancy management planning."}, {"q": "A child with cerebral palsy is being evaluated for shared characteristics with other affected children. Which characteristic is common to ALL individuals with cerebral palsy?", "opts": ["Some loss of cognitive function in every case", "One or more types of seizure in every case", "Serious multiple communication difficulties in every case", "Some degree of motor disability"], "ans": 3, "exp": "While cognitive impairment, seizures, and communication difficulties are common and can co-occur with cerebral palsy, they are not universal. The one characteristic shared by ALL individuals with CP is some degree of motor disability, since CP is fundamentally a disorder of movement and posture."}, {"q": "A child is diagnosed with cerebral palsy following a difficult, hypoxic birth. Which statement applies to this diagnosis?", "opts": ["It represents nonprogressive brain damage to the fetus or neonate", "It is a genetic defect affecting metabolism that causes neuronal degeneration", "It is a developmental error during growth of the peripheral nervous system", "It is a chromosomal defect causing abnormalities in many body systems"], "ans": 0, "exp": "Cerebral palsy results from nonprogressive (static) brain damage occurring in the fetus or neonate (often from hypoxic injury, prematurity-related complications, or trauma), affecting movement and posture, though the clinical presentation may evolve as the child develops and grows."}, {"q": "A patient has a generalized seizure characterized by widespread cortical involvement. Which finding is characteristic of generalized seizures?", "opts": ["Localization of seizure activity to one focal area", "Uncontrolled discharge of neurons in both cerebral hemispheres", "Seizures that persist for several hours without stopping", "Loss of consciousness in every single case without exception"], "ans": 1, "exp": "Generalized seizures are characterized by uncontrolled, simultaneous discharge of neurons in both cerebral hemispheres, distinguishing them from focal (partial) seizures, which originate from and are limited to a localized area of one hemisphere."}, {"q": "A patient with multiple sclerosis experiences periods of worsening symptoms followed by periods of improvement. What characteristic of MS does this describe?", "opts": ["Remissions and exacerbations", "A predictable pattern of progression in all patients", "Onset exclusively in men and women over 60 years old", "Full recovery of function during every remission"], "ans": 0, "exp": "Multiple sclerosis is classically characterized by a relapsing-remitting pattern of exacerbations (worsening symptoms) and remissions (symptom improvement), though the course can vary significantly between individuals and may not always include full recovery during remission."}, {"q": "A patient's neurologist describes the underlying mechanism of multiple sclerosis to the family. Which statement does NOT accurately describe MS pathophysiology?", "opts": ["Demyelination of axons occurs", "It affects the brain, spinal cord, and cranial nerves", "It affects motor, sensory, and autonomic fibers", "It involves progressive, random degeneration of peripheral nerves"], "ans": 3, "exp": "This question asks which statement does NOT apply. MS is a CNS disease affecting the brain, spinal cord, and cranial nerves (with demyelination of axons affecting motor, sensory, and autonomic fibers)—it does NOT involve degeneration of peripheral nerves, which would instead describe a peripheral neuropathy."}, {"q": "A young woman reports new numbness in her legs, mild leg weakness, and blurred vision over the past week. Which set of findings represents common EARLY signs of multiple sclerosis?", "opts": ["Paralysis of the lower body with impaired cognitive function", "Areas of numbness, weakness in the legs, and visual problems", "Sensory deficit in the legs and trunk with memory loss and urinary incontinence", "Tremors, speech impairment, and hearing loss"], "ans": 1, "exp": "Common early signs of multiple sclerosis include areas of numbness, weakness in the legs, and visual disturbances (such as optic neuritis), reflecting the patchy demyelination affecting various CNS pathways early in the disease course."}, {"q": "A 68-year-old man with no history of antipsychotic medication use develops a resting tremor and bradykinesia. Which statement applies to his likely diagnosis of Parkinson disease?", "opts": ["It usually develops in men and women over 60 years of age", "There is no apparent genetic component in any cases", "The majority of cases are predisposed by antipsychotic medication intake", "It rarely develops in women"], "ans": 0, "exp": "Parkinson disease usually develops in men and women over the age of 60, though a genetic component is recognized in some cases (particularly early-onset forms), and it affects both sexes, including women, despite this patient being male."}, {"q": "A patient with Parkinson disease has resting tremor and rigidity. What is the underlying pathophysiologic change responsible for these symptoms?", "opts": ["Degeneration of motor fibers in the pyramidal tracts", "Excess secretion of stimulatory neurotransmitters in the CNS", "Degeneration of the basal nuclei (ganglia) with a deficit of dopamine", "Deficit of acetylcholine with degeneration of the frontal motor cortex"], "ans": 2, "exp": "Parkinson disease results from degeneration of the basal nuclei (ganglia), specifically the dopamine-producing neurons of the substantia nigra, leading to a relative deficiency of dopamine at the synaptic cleft and producing the classic motor symptoms of tremor, rigidity, and bradykinesia."}, {"q": "A patient newly diagnosed with Parkinson disease asks about early warning signs they may have missed. Which are common early manifestations of this condition?", "opts": ["Tremors at rest in the hands with repetitive hand movements", "Extreme leg weakness with spastic arm movements", "Visual deficits with speech impairment as the primary complaint", "Loss of facial expression with altered posture and gait"], "ans": 0, "exp": "Common early manifestations of Parkinson disease include resting tremor in the hands and repetitive (pill-rolling type) hand movements, often noticed before more advanced features such as bradykinesia, rigidity, and postural/gait changes become prominent."}, {"q": "A patient with advanced Parkinson disease is being assessed for typical complications. Which of the following is NOT a typical effect of advanced Parkinson disease?", "opts": ["Difficulty chewing and swallowing", "Urinary retention", "Loss of vision", "Orthostatic hypotension"], "ans": 2, "exp": "Loss of vision is not a typical effect of advanced Parkinson disease. Difficulty chewing/swallowing, urinary retention, and orthostatic hypotension are all recognized autonomic and motor complications that can develop as the disease progresses."}, {"q": "A family member asks about early signs of Alzheimer disease they should watch for. Which combination represents typical EARLY signs? (1) Behavioral changes, (2) reduced ability to reason/problem-solve, (3) decreased verbal responses, (4) urinary incontinence", "opts": ["1 and 2", "1 and 4", "2 and 3", "1, 3, and 4"], "ans": 0, "exp": "Early signs of Alzheimer disease typically include behavioral changes and a reduced ability to reason and problem-solve, often accompanied by forgetfulness and emotional changes. Decreased verbal responses and urinary incontinence tend to emerge later as the disease progresses to more advanced stages."}, {"q": "A patient with communicating hydrocephalus is being evaluated. What is the underlying mechanism causing increased intracranial pressure in this type of hydrocephalus?", "opts": ["Atresia at the foramen magnum", "Failure of the subarachnoid space (arachnoid villi) to absorb CSF", "Obstruction in the lumbar area of the spinal cord", "Scar tissue from encephalitis blocking flow of CSF within the ventricles"], "ans": 1, "exp": "Communicating hydrocephalus results from failure of the arachnoid villi to adequately absorb CSF after it has exited the ventricular system, as opposed to noncommunicating (obstructive) hydrocephalus, where a blockage occurs within the ventricular system itself, before CSF reaches the subarachnoid space."}, {"q": "An imaging study reveals failure of the spinous processes to fuse, without herniation of the meninges through the defect. What is this condition called?", "opts": ["Spina bifida occulta", "Meningocele", "Myelomeningocele", "Encephalocele"], "ans": 0, "exp": "Spina bifida occulta is the mildest form of spina bifida, involving failure of the posterior spinous processes (vertebral arch) to fuse, without herniation of the meninges or spinal cord through the defect—often asymptomatic and discovered incidentally."}, {"q": "A patient is diagnosed with major depressive disorder. Which statement is TRUE about this condition?", "opts": ["It is classified as a mood disorder", "Episodes of intense fear are a defining feature", "It is marked by increased appetite and libido in all cases", "It is not a common condition"], "ans": 0, "exp": "Depression is classified as a mood disorder. While appetite changes can occur, they are more typically decreased rather than increased, and depression is, in fact, one of the most common mental health conditions—not rare. Intense recurrent fear is more characteristic of panic or anxiety disorders."}], "color": "c14"}, {"title": "Pain, Temperature, Sleep, and Sensory Function", "code": "Chapter 15", "subtitle": "Nociception, Thermoregulation, Sleep Physiology & the Special Senses", "general": [{"q": "Where can nociceptors (free nerve endings that detect harmful stimuli) be found in the body?", "opts": ["Skin, muscle, joints, and viscera", "Only in the epidermis", "Only within the CNS", "Only in skeletal muscle"], "ans": 0, "exp": "Nociceptors are free nerve endings located in the skin, muscle, joints, arteries, and viscera, responding to chemical, mechanical, and thermal stimuli that signal potential or actual tissue damage."}, {"q": "Which system reflects an individual's conditioned or learned approach/avoidance behavior in response to pain?", "opts": ["Sensory-discriminative system", "Affective-motivational system", "Cognitive-evaluative system", "Autonomic reflex system"], "ans": 1, "exp": "The affective-motivational system reflects conditioned or learned approach/avoidance behaviors in response to pain, as part of the broader perception phase of nociception. The sensory-discriminative system identifies the location/intensity of pain, while the cognitive-evaluative system involves pain threshold, tolerance, and perceptual dominance."}, {"q": "Which theory explains why a needle prick causes minimal pain while a deeper cut from a knife causes more severe pain?", "opts": ["Gate control theory", "Specificity theory", "Pattern theory", "Placebo theory"], "ans": 1, "exp": "Specificity theory holds that specific pain receptors respond to specific types and intensities of stimuli, explaining why different types or depths of tissue injury (a superficial prick versus a deeper cut) produce different intensities of pain."}, {"q": "A 15-year-old scrapes her knee while playing soccer and reports sharp, well-localized pain. How should the nurse best characterize this pain?", "opts": ["Visceral pain", "Somatic pain", "Referred pain", "Neuropathic pain"], "ans": 1, "exp": "Somatic pain arises from the skin, muscles, or joints and is typically sharp and well-localized, as in this case of a superficial skin injury. Visceral pain arises from internal organs and is poorly localized; referred pain is felt at a site distant from its origin; neuropathic pain results from nerve dysfunction rather than acute tissue injury."}, {"q": "Chronic pain is generally documented when pain has lasted longer than:", "opts": ["24-48 hours", "2-4 weeks", "3 to 6 months", "1 year"], "ans": 2, "exp": "Chronic pain is generally defined as pain lasting longer than the expected healing time, typically 3 to 6 months, distinguishing it from acute pain, which is transient and resolves once the underlying stimulus is removed."}, {"q": "A patient who lost a hand in a workplace accident years ago still sporadically feels pain in the absent hand. What type of pain is this?", "opts": ["Somatic pain", "Visceral pain", "Phantom limb pain", "Referred pain"], "ans": 2, "exp": "Phantom limb pain is pain perceived as arising from a body part that has been amputated, thought to result from reorganization and abnormal signaling within the remaining peripheral and central nervous system pathways."}, {"q": "When planning care for a child experiencing pain, the nurse should remember that the pain threshold in children is:", "opts": ["Higher than that of adults", "Lower than that of adults", "Identical to that of adults", "Unrelated to age"], "ans": 1, "exp": "The pain threshold in children is lower than that of adults, meaning children may perceive pain from a given stimulus more intensely or at a lower stimulus level than an adult would."}, {"q": "Regulation of body temperature primarily occurs in which structure?", "opts": ["Hypothalamus", "Thalamus", "Medulla oblongata", "Cerebellum"], "ans": 0, "exp": "The hypothalamus is the primary center responsible for regulating body temperature, integrating input from peripheral and central thermoreceptors to balance heat production, conservation, and loss."}, {"q": "What term describes the cyclical fluctuation in body temperature (and other physiologic processes) that occurs on a roughly 24-hour daily basis?", "opts": ["Circadian rhythm", "Homeostasis", "Autoregulation", "Diurnal variance"], "ans": 0, "exp": "Circadian rhythm refers to the cyclical, roughly 24-hour pattern of physiologic fluctuation, including the daily variation seen in body temperature, which is typically lowest in early morning and highest in late afternoon/evening."}, {"q": "Heat loss from the body via convection occurs through which mechanism?", "opts": ["Direct transfer of heat through contact with a cooler object", "Transfer of heat through currents of liquid or gas", "Transfer of heat as infrared radiant energy", "Transfer of heat through evaporation of moisture"], "ans": 1, "exp": "Convection is the transfer of heat through currents of liquid or gas (such as air moving across the skin), distinct from conduction (direct contact transfer), radiation (infrared energy transfer), and evaporation (heat loss through the conversion of liquid to vapor)."}, {"q": "For evaporation to function effectively as a means of dissipating excess body heat, which condition must be present?", "opts": ["Low humidity only", "Moisture on the skin surface", "Direct skin contact with a cool surface", "Air currents alone, without moisture"], "ans": 1, "exp": "Evaporation requires moisture (such as sweat) on the skin surface; as this moisture converts to vapor, it carries heat away from the body. Without adequate moisture, evaporative heat loss cannot occur effectively, regardless of air currents or humidity conditions alone."}, {"q": "When a patient develops a fever, which thermoregulatory mechanism is activated?", "opts": ["The body's thermostat is reset to a higher level", "Heat production is permanently disabled", "The hypothalamus is bypassed entirely", "Only peripheral vasodilation occurs
